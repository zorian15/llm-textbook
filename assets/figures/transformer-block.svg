<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="a pre-norm transformer block">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">ONE PRE-NORM BLOCK</text>
<text x="24" y="62" font-size="10.5" fill="#274b6d" font-weight="600">residual stream (an identity path the signal always keeps)</text>
<path d="M 40 74 L 620 74" stroke="#274b6d" stroke-width="2.5" marker-end="url(#d1)"/>
<rect x="24.0" y="59.0" width="30.0" height="30.0" rx="6" fill="#274b6d" stroke="none"/>
<text x="39.0" y="78.2" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">x</text>
<circle cx="270" cy="74" r="12" fill="#ffffff" stroke="#274b6d" stroke-width="2"/>
<text x="270" y="79" font-size="15" text-anchor="middle" fill="#274b6d">+</text>
<path d="M 130 78 L 130 144 L 150 144" fill="none" stroke="#cfcdc4" stroke-width="1.4"/>
<rect x="150.0" y="128.0" width="92.0" height="32.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="196.0" y="147.8" font-size="11" font-weight="400" text-anchor="middle" fill="#274b6d">RMSNorm</text>
<path d="M 242 144 L 258 144" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#d2)"/>
<rect x="258.0" y="128.0" width="92.0" height="32.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="304.0" y="148.2" font-size="12" font-weight="700" text-anchor="middle" fill="#17181b">Attention</text>
<path d="M 304 128 L 304 88 L 270 88" fill="none" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#d3)"/>
<text x="250" y="178" font-size="10" text-anchor="middle" fill="#6a6d73">mix across positions</text>
<circle cx="520" cy="74" r="12" fill="#ffffff" stroke="#274b6d" stroke-width="2"/>
<text x="520" y="79" font-size="15" text-anchor="middle" fill="#274b6d">+</text>
<path d="M 380 78 L 380 144 L 400 144" fill="none" stroke="#cfcdc4" stroke-width="1.4"/>
<rect x="400.0" y="128.0" width="92.0" height="32.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="446.0" y="147.8" font-size="11" font-weight="400" text-anchor="middle" fill="#274b6d">RMSNorm</text>
<path d="M 492 144 L 508 144" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#d2)"/>
<rect x="508.0" y="128.0" width="92.0" height="32.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="554.0" y="148.2" font-size="12" font-weight="700" text-anchor="middle" fill="#17181b">FFN</text>
<path d="M 554 128 L 554 88 L 520 88" fill="none" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#d3)"/>
<text x="500" y="178" font-size="10" text-anchor="middle" fill="#6a6d73">transform each position</text>
<rect x="624.0" y="59.0" width="30.0" height="30.0" rx="6" fill="#ffffff" stroke="none"/>
<text x="639.0" y="79.6" font-size="16" font-weight="400" text-anchor="middle" fill="#274b6d">→</text>
<text x="330.0" y="248" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Normalize, apply a sublayer, add the result back — twice. The stream is never overwritten, only added to.</text>
<defs><marker id="d1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#274b6d"/></marker></defs>
<defs><marker id="d2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
<defs><marker id="d3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
</svg>