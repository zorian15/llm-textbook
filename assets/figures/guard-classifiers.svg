<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="input and output guard classifiers around an assistant">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">GUARD MODELS AROUND THE ASSISTANT</text>
<rect x="24.0" y="102.0" width="72.0" height="34.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="60.0" y="123.2" font-size="12" font-weight="400" text-anchor="middle" fill="#274b6d">user</text>
<rect x="128" y="96" width="108" height="46" rx="10" fill="#ffffff" stroke="#9c6b12" stroke-width="1.3"/>
<text x="182.0" y="117.0" font-size="12" font-weight="700" text-anchor="middle" fill="#17181b">input guard</text>
<text x="182.0" y="133.0" font-size="9.5" text-anchor="middle" fill="#6a6d73">classify prompt</text>
<rect x="276" y="96" width="120" height="46" rx="10" fill="#274b6d" stroke="#274b6d" stroke-width="1.3"/>
<text x="336.0" y="117.0" font-size="12" font-weight="700" text-anchor="middle" fill="#ffffff">assistant</text>
<text x="336.0" y="133.0" font-size="9.5" text-anchor="middle" fill="#eaf0f6">the main LLM</text>
<rect x="436" y="96" width="116" height="46" rx="10" fill="#ffffff" stroke="#9c6b12" stroke-width="1.3"/>
<text x="494.0" y="117.0" font-size="12" font-weight="700" text-anchor="middle" fill="#17181b">output guard</text>
<text x="494.0" y="133.0" font-size="9.5" text-anchor="middle" fill="#6a6d73">classify reply</text>
<rect x="592.0" y="102.0" width="104.0" height="34.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="644.0" y="123.2" font-size="12" font-weight="400" text-anchor="middle" fill="#274b6d">delivered</text>
<path d="M 98 119 L 124 119" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#sgp_a)"/>
<path d="M 238 119 L 272 119" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#sgp_a)"/>
<path d="M 398 119 L 432 119" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#sgp_a)"/>
<path d="M 554 119 L 588 119" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#sgp_a)"/>
<path d="M 182 142 L 182 192" stroke="#b04a3f" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#sgp_block)"/>
<path d="M 494 142 L 494 192" stroke="#b04a3f" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#sgp_block)"/>
<rect x="150" y="192" width="400" height="40" rx="10" fill="#fbeceb" stroke="#b04a3f" stroke-width="1.3"/>
<text x="350.0" y="210.0" font-size="12" font-weight="700" text-anchor="middle" fill="#b04a3f">refuse / redact / escalate</text>
<text x="350.0" y="226.0" font-size="9.5" text-anchor="middle" fill="#6a6d73">when either guard fires</text>
<text x="360.0" y="286" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Two cheap classifiers bracket one expensive model; either can stop a turn before or after the LLM ever speaks.</text>
<defs><marker id="sgp_a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
<defs><marker id="sgp_block" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b04a3f"/></marker></defs>
</svg>