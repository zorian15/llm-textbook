<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 268" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="tool call JSON round trip">
<text x="16.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">ONE TOOL CALL, AS JSON</text>
<text x="16.0" y="44.0" font-size="11" font-weight="700" fill="#274b6d" letter-spacing="1">TOOL SCHEMA</text>
<rect x="16" y="56" width="200" height="168" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="16" y="56" width="4" height="168" rx="2" fill="#274b6d"/>
<text x="32" y="80" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">"name": "get_weather"</text>
<text x="32" y="99" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">"description":</text>
<text x="32" y="118" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#6a6d73">  "current weather in a</text>
<text x="32" y="137" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#6a6d73">   named city"</text>
<text x="32" y="156" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">"parameters": {</text>
<text x="32" y="175" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#3b3d42">  city: string,</text>
<text x="32" y="194" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#3b3d42">  unit: [C, F] }</text>
<text x="260.0" y="44.0" font-size="11" font-weight="700" fill="#9c6b12" letter-spacing="1">MODEL EMITS</text>
<rect x="260" y="56" width="200" height="168" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="260" y="56" width="4" height="168" rx="2" fill="#9c6b12"/>
<text x="276" y="80" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#9c6b12">&lt;tool_call&gt;</text>
<text x="276" y="99" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">{ "name":</text>
<text x="276" y="118" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">    "get_weather",</text>
<text x="276" y="137" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">  "city": "Denver",</text>
<text x="276" y="156" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">  "unit": "C" }</text>
<text x="276" y="175" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#9c6b12">&lt;/tool_call&gt;</text>
<text x="504.0" y="44.0" font-size="11" font-weight="700" fill="#6b4f9c" letter-spacing="1">HARNESS RETURNS</text>
<rect x="504" y="56" width="200" height="168" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="504" y="56" width="4" height="168" rx="2" fill="#6b4f9c"/>
<text x="520" y="80" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#6b4f9c">&lt;tool_result&gt;</text>
<text x="520" y="99" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">{ "temp_c": 18,</text>
<text x="520" y="118" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">  "sky": "clear" }</text>
<text x="520" y="137" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#6b4f9c">&lt;/tool_result&gt;</text>
<text x="520" y="156" font-size="10.5" fill="#6a6d73"></text>
<text x="520" y="175" font-size="10.5" fill="#6a6d73">read as tokens by</text>
<text x="520" y="194" font-size="10.5" fill="#6a6d73">the model next turn</text>
<path d="M 220 140.0 L 254 140.0" fill="none" stroke="#cfcdc4" stroke-width="1.8" marker-end="url(#rt_a)"/>
<text x="238.0" y="132.0" font-size="9" text-anchor="middle" fill="#6a6d73">pick + fill</text>
<path d="M 464 140.0 L 498 140.0" fill="none" stroke="#cfcdc4" stroke-width="1.8" marker-end="url(#rt_a)"/>
<text x="482.0" y="132.0" font-size="9" text-anchor="middle" fill="#6a6d73">execute</text>
<path d="M 604.0 228 C 604.0 260, 360.0 260, 360.0 228" fill="none" stroke="#6b4f9c" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#rt_b)"/>
<text x="482.0" y="264" font-size="9.5" text-anchor="middle" fill="#6b4f9c" font-style="italic">appended to context</text>
<defs><marker id="rt_a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
<defs><marker id="rt_b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6b4f9c"/></marker></defs>
</svg>