<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="static versus continuous batching schedules">
<text x="24.0" y="28.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">WHERE THE GPU IDLES</text>
<text x="24" y="52" font-size="12" font-weight="700" fill="#17181b">Static batching</text>
<line x1="150" y1="64" x2="150" y2="176" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="180" y1="64" x2="180" y2="176" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="210" y1="64" x2="210" y2="176" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="240" y1="64" x2="240" y2="176" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="270" y1="64" x2="270" y2="176" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="300" y1="64" x2="300" y2="176" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="330" y1="64" x2="330" y2="176" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="360" y1="64" x2="360" y2="176" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="390" y1="64" x2="390" y2="176" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="420" y1="64" x2="420" y2="176" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="450" y1="64" x2="450" y2="176" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="480" y1="64" x2="480" y2="176" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="510" y1="64" x2="510" y2="176" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="540" y1="64" x2="540" y2="176" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="570" y1="64" x2="570" y2="176" stroke="#e4e3dd" stroke-width="0.7"/>
<text x="138" y="79.0" font-size="10.5" text-anchor="end" fill="#6a6d73">req A</text>
<rect x="150" y="64" width="147" height="22" rx="4" fill="#274b6d" opacity="0.85"/>
<rect x="300" y="64" width="267" height="22" rx="4" fill="#efeee8" stroke="#cfcdc4" stroke-dasharray="3 3"/>
<text x="138" y="109.0" font-size="10.5" text-anchor="end" fill="#6a6d73">req B</text>
<rect x="150" y="94" width="417" height="22" rx="4" fill="#6b4f9c" opacity="0.85"/>
<text x="138" y="139.0" font-size="10.5" text-anchor="end" fill="#6a6d73">req C</text>
<rect x="150" y="124" width="87" height="22" rx="4" fill="#9c6b12" opacity="0.85"/>
<rect x="240" y="124" width="327" height="22" rx="4" fill="#efeee8" stroke="#cfcdc4" stroke-dasharray="3 3"/>
<text x="138" y="169.0" font-size="10.5" text-anchor="end" fill="#6a6d73">req D</text>
<rect x="150" y="154" width="237" height="22" rx="4" fill="#b04a3f" opacity="0.85"/>
<rect x="390" y="154" width="177" height="22" rx="4" fill="#efeee8" stroke="#cfcdc4" stroke-dasharray="3 3"/>
<text x="150" y="198" font-size="10" fill="#6a6d73" font-style="italic">finished requests hold their slot idle until the slowest one in the batch ends</text>
<text x="24" y="202" font-size="12" font-weight="700" fill="#17181b">Continuous (in-flight) batching</text>
<line x1="150" y1="214" x2="150" y2="326" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="180" y1="214" x2="180" y2="326" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="210" y1="214" x2="210" y2="326" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="240" y1="214" x2="240" y2="326" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="270" y1="214" x2="270" y2="326" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="300" y1="214" x2="300" y2="326" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="330" y1="214" x2="330" y2="326" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="360" y1="214" x2="360" y2="326" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="390" y1="214" x2="390" y2="326" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="420" y1="214" x2="420" y2="326" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="450" y1="214" x2="450" y2="326" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="480" y1="214" x2="480" y2="326" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="510" y1="214" x2="510" y2="326" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="540" y1="214" x2="540" y2="326" stroke="#e4e3dd" stroke-width="0.7"/>
<line x1="570" y1="214" x2="570" y2="326" stroke="#e4e3dd" stroke-width="0.7"/>
<text x="138" y="229.0" font-size="10.5" text-anchor="end" fill="#6a6d73">slot 1</text>
<rect x="150" y="214" width="147" height="22" rx="4" fill="#274b6d" opacity="0.85"/>
<rect x="300" y="214" width="177" height="22" rx="4" fill="#6b4f9c" opacity="0.85"/>
<rect x="480" y="214" width="87" height="22" rx="4" fill="#9c6b12" opacity="0.85"/>
<text x="138" y="259.0" font-size="10.5" text-anchor="end" fill="#6a6d73">slot 2</text>
<rect x="150" y="244" width="87" height="22" rx="4" fill="#b04a3f" opacity="0.85"/>
<rect x="240" y="244" width="207" height="22" rx="4" fill="#274b6d" opacity="0.85"/>
<rect x="450" y="244" width="117" height="22" rx="4" fill="#6b4f9c" opacity="0.85"/>
<text x="138" y="289.0" font-size="10.5" text-anchor="end" fill="#6a6d73">slot 3</text>
<rect x="150" y="274" width="237" height="22" rx="4" fill="#9c6b12" opacity="0.85"/>
<rect x="390" y="274" width="177" height="22" rx="4" fill="#b04a3f" opacity="0.85"/>
<text x="138" y="319.0" font-size="10.5" text-anchor="end" fill="#6a6d73">slot 4</text>
<rect x="150" y="304" width="117" height="22" rx="4" fill="#6b4f9c" opacity="0.85"/>
<rect x="270" y="304" width="147" height="22" rx="4" fill="#9c6b12" opacity="0.85"/>
<rect x="420" y="304" width="147" height="22" rx="4" fill="#274b6d" opacity="0.85"/>
<text x="150" y="348" font-size="10" fill="#6a6d73" font-style="italic">a new request joins at the very next iteration, so the GPU never idles on a freed slot</text>
<text x="340.0" y="368" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Same four colors of work, far less white space: keeping the batch full is the whole game.</text>
</svg>