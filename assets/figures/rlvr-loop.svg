<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="the reinforcement learning from verifiable rewards loop">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">RL ON VERIFIABLE REWARDS</text>
<rect x="24.0" y="84" width="154.0" height="76" rx="9" fill="#274b6d" stroke="none"/>
<text x="101.0" y="114" font-size="12.5" font-weight="700" text-anchor="middle" fill="#fff">policy (LLM)</text>
<text x="101.0" y="132.0" font-size="10" text-anchor="middle" fill="#eaf0f6">the reasoning</text>
<text x="101.0" y="146.0" font-size="10" text-anchor="middle" fill="#eaf0f6">model</text>
<rect x="204.0" y="84" width="170.0" height="76" rx="9" fill="#fff" stroke="#cfcdc4"/>
<text x="289.0" y="114" font-size="12.5" font-weight="700" text-anchor="middle" fill="#17181b">sample</text>
<text x="289.0" y="132.0" font-size="10" text-anchor="middle" fill="#6a6d73">chain of thought</text>
<text x="289.0" y="146.0" font-size="10" text-anchor="middle" fill="#6a6d73">+ final answer</text>
<rect x="400.0" y="84" width="170.0" height="76" rx="9" fill="#9c6b12" stroke="none"/>
<text x="485.0" y="114" font-size="12.5" font-weight="700" text-anchor="middle" fill="#fff">verifier</text>
<text x="485.0" y="132.0" font-size="10" text-anchor="middle" fill="#f3e6cf">run the code /</text>
<text x="485.0" y="146.0" font-size="10" text-anchor="middle" fill="#f3e6cf">check the math</text>
<rect x="596.0" y="84" width="100.0" height="76" rx="9" fill="#fff" stroke="#cfcdc4"/>
<text x="646.0" y="114" font-size="12.5" font-weight="700" text-anchor="middle" fill="#17181b">reward</text>
<text x="646.0" y="132.0" font-size="10" text-anchor="middle" fill="#6a6d73">+1 correct</text>
<text x="646.0" y="146.0" font-size="10" text-anchor="middle" fill="#6a6d73">0 wrong</text>
<defs><marker id="rl1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
<path d="M 182 122 L 198 122" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#rl1)"/>
<path d="M 378 122 L 394 122" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#rl1)"/>
<path d="M 574 122 L 590 122" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#rl1)"/>
<defs><marker id="rl2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#274b6d"/></marker></defs>
<path d="M 646.0 160 L 646.0 232 L 101.0 232 L 101.0 164" fill="none" stroke="#274b6d" stroke-width="1.8" marker-end="url(#rl2)"/>
<text x="373.5" y="226" font-size="10.5" text-anchor="middle" fill="#274b6d" font-weight="600">update the policy toward chains that scored (GRPO / PPO)</text>
<text x="360.0" y="288" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">The reward is a checker, not a learned model — so there is nothing to reward-hack.</text>
</svg>