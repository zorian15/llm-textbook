<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="supervised fine-tuning as behavior cloning">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">SUPERVISED FINE-TUNING = BEHAVIOR CLONING</text>
<rect x="24" y="52" width="262" height="54" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="24" y="52" width="4" height="54" rx="2" fill="#274b6d"/>
<text x="40" y="73" font-size="9" font-weight="700" fill="#6a6d73" letter-spacing="0.5">USER</text>
<text x="82" y="73" font-size="10.5" fill="#3b3d42">Reverse this list.</text>
<text x="40" y="94" font-size="9" font-weight="700" fill="#274b6d" letter-spacing="0.5">ASST</text>
<text x="82" y="94" font-size="10.5" font-weight="600" fill="#274b6d">Use nums[::-1] to get a copy.</text>
<rect x="24" y="114" width="262" height="54" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="24" y="114" width="4" height="54" rx="2" fill="#274b6d"/>
<text x="40" y="135" font-size="9" font-weight="700" fill="#6a6d73" letter-spacing="0.5">USER</text>
<text x="82" y="135" font-size="10.5" fill="#3b3d42">Is 51 prime?</text>
<text x="40" y="156" font-size="9" font-weight="700" fill="#274b6d" letter-spacing="0.5">ASST</text>
<text x="82" y="156" font-size="10.5" font-weight="600" fill="#274b6d">No. 51 = 3 &#215; 17, so it is composite.</text>
<rect x="24" y="176" width="262" height="54" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="24" y="176" width="4" height="54" rx="2" fill="#274b6d"/>
<text x="40" y="197" font-size="9" font-weight="700" fill="#6a6d73" letter-spacing="0.5">USER</text>
<text x="82" y="197" font-size="10.5" fill="#3b3d42">Summarize this email.</text>
<text x="40" y="218" font-size="9" font-weight="700" fill="#274b6d" letter-spacing="0.5">ASST</text>
<text x="82" y="218" font-size="10.5" font-weight="600" fill="#274b6d">The sender asks to reschedule to Friday.</text>
<path d="M 292 167.0 L 360 167.0" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#sftc)"/>
<text x="326.0" y="124" font-size="10.5" text-anchor="middle" fill="#274b6d">clone the</text>
<text x="326.0" y="137" font-size="10.5" text-anchor="middle" fill="#274b6d">demonstrated</text>
<text x="326.0" y="150" font-size="10.5" text-anchor="middle" fill="#274b6d">behavior</text>
<rect x="366.0" y="138.0" width="116.0" height="58.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="424.0" y="171.4" font-size="12.5" font-weight="700" text-anchor="middle" fill="#274b6d">base model</text>
<path d="M 488 167.0 L 542 167.0" stroke="#274b6d" stroke-width="1.8" marker-end="url(#sftc2)"/>
<text x="515.0" y="159.0" font-size="10" text-anchor="middle" fill="#6a6d73">SFT</text>
<rect x="548.0" y="138.0" width="104.0" height="58.0" rx="6" fill="#274b6d" stroke="none"/>
<text x="600.0" y="171.4" font-size="12.5" font-weight="700" text-anchor="middle" fill="#ffffff">assistant</text>
<text x="340.0" y="288" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Same next-token objective as pretraining, now on curated answers: the model copies the behavior, not new facts.</text>
<defs><marker id="sftc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
<defs><marker id="sftc2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#274b6d"/></marker></defs>
</svg>