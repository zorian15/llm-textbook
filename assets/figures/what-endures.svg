<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="what changes versus what endures">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">WHAT TO HOLD ONTO</text>
<rect x="30" y="58" width="272" height="236" rx="10" fill="#ffffff" stroke="#6a6d73" stroke-width="1.2"/>
<rect x="30" y="58" width="272" height="6" rx="3" fill="#6a6d73"/>
<text x="166.0" y="88" font-size="12.5" font-weight="700" text-anchor="middle" fill="#6a6d73">keeps changing</text>
<circle cx="50" cy="114" r="3" fill="#6a6d73"/>
<text x="64" y="118" font-size="10.5" fill="#3b3d42">which model tops the leaderboard</text>
<circle cx="50" cy="146" r="3" fill="#6a6d73"/>
<text x="64" y="150" font-size="10.5" fill="#3b3d42">benchmark scores and prices</text>
<circle cx="50" cy="178" r="3" fill="#6a6d73"/>
<text x="64" y="182" font-size="10.5" fill="#3b3d42">context-window and token counts</text>
<circle cx="50" cy="210" r="3" fill="#6a6d73"/>
<text x="64" y="214" font-size="10.5" fill="#3b3d42">the tool and agent frameworks</text>
<circle cx="50" cy="242" r="3" fill="#6a6d73"/>
<text x="64" y="246" font-size="10.5" fill="#3b3d42">this month's prompting trick</text>
<rect x="338" y="58" width="272" height="236" rx="10" fill="#ffffff" stroke="#274b6d" stroke-width="1.2"/>
<rect x="338" y="58" width="272" height="6" rx="3" fill="#274b6d"/>
<text x="474.0" y="88" font-size="12.5" font-weight="700" text-anchor="middle" fill="#274b6d">stays worth knowing</text>
<circle cx="358" cy="114" r="3" fill="#274b6d"/>
<text x="372" y="118" font-size="10.5" fill="#3b3d42">the next-token objective (Ch 6)</text>
<circle cx="358" cy="146" r="3" fill="#274b6d"/>
<text x="372" y="150" font-size="10.5" fill="#3b3d42">attention and the transformer (Ch 4)</text>
<circle cx="358" cy="178" r="3" fill="#274b6d"/>
<text x="372" y="182" font-size="10.5" fill="#3b3d42">scaling laws as a design tool (Ch 9)</text>
<circle cx="358" cy="210" r="3" fill="#274b6d"/>
<text x="372" y="214" font-size="10.5" fill="#3b3d42">post-training and alignment (Ch 10-12)</text>
<circle cx="358" cy="242" r="3" fill="#274b6d"/>
<text x="372" y="246" font-size="10.5" fill="#3b3d42">the harness around the weights (Part V)</text>
<circle cx="358" cy="274" r="3" fill="#274b6d"/>
<text x="372" y="278" font-size="10.5" fill="#3b3d42">how you know it works (Part VI)</text>
<text x="320.0" y="312" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">The names on the left turn over every few months; the ideas on the right have held for years.</text>
</svg>