<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 268" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="the plan-act-observe agent loop">
<text x="40.0" y="34.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">ONE STEP, RUN OVER AND OVER</text>
<rect x="40" y="70" width="152" height="62" rx="9" fill="#eaf0f6" stroke="#274b6d"/>
<text x="116.0" y="94" font-size="15" font-weight="700" text-anchor="middle" fill="#274b6d">plan</text>
<text x="116.0" y="110" font-size="10" text-anchor="middle" fill="#6a6d73">the model decides</text>
<text x="116.0" y="123" font-size="10" text-anchor="middle" fill="#6a6d73">the next step</text>
<path d="M 200 101.0 L 256 101.0" stroke="#274b6d" stroke-width="1.8" marker-end="url(#al)"/>
<text x="228.0" y="93.0" font-size="9.5" text-anchor="middle" fill="#6a6d73">then</text>
<rect x="264" y="70" width="152" height="62" rx="9" fill="#ffffff" stroke="#cfcdc4"/>
<text x="340.0" y="94" font-size="15" font-weight="700" text-anchor="middle" fill="#17181b">act</text>
<text x="340.0" y="110" font-size="10" text-anchor="middle" fill="#6a6d73">emit a tool call</text>
<text x="340.0" y="123" font-size="10" text-anchor="middle" fill="#6a6d73">(Chapter 19)</text>
<path d="M 424 101.0 L 480 101.0" stroke="#274b6d" stroke-width="1.8" marker-end="url(#al)"/>
<text x="452.0" y="93.0" font-size="9.5" text-anchor="middle" fill="#6a6d73">harness runs it</text>
<rect x="488" y="70" width="152" height="62" rx="9" fill="#ffffff" stroke="#cfcdc4"/>
<text x="564.0" y="94" font-size="15" font-weight="700" text-anchor="middle" fill="#17181b">observe</text>
<text x="564.0" y="110" font-size="10" text-anchor="middle" fill="#6a6d73">read the result</text>
<text x="564.0" y="123" font-size="10" text-anchor="middle" fill="#6a6d73">back into context</text>
<path d="M 564.0 136 L 564.0 176 L 116.0 176 L 116.0 136" fill="none" stroke="#6b4f9c" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#alv)"/>
<text x="340.0" y="194" font-size="11" text-anchor="middle" fill="#6b4f9c">repeat until the goal is met or the step budget runs out</text>
<path d="M 638.0 101.0 L 684.0 101.0" stroke="#cfcdc4" stroke-width="1.5" marker-end="url(#al)"/>
<text x="686.0" y="95.0" font-size="10" fill="#6a6d73">done</text>
<text x="340.0" y="256" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">The model only proposes the next action; the harness executes it and closes the loop.</text>
<defs><marker id="al" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#274b6d"/></marker></defs>
<defs><marker id="alv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6b4f9c"/></marker></defs>
</svg>