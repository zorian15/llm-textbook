<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="the Constitutional AI self-critique and RLAIF loop">
<text x="24.0" y="32.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">REPLACING THE HUMAN LABELER WITH A PRINCIPLE</text>
<text x="24" y="66" font-size="10.5" font-weight="700" fill="#6b4f9c">Phase 1 &#183; supervised: critique and revise</text>
<rect x="24" y="74" width="128" height="58" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<text x="88.0" y="95" font-size="11.5" font-weight="700" text-anchor="middle" fill="#17181b">response</text>
<text x="88.0" y="111" font-size="9.5" text-anchor="middle" fill="#6a6d73">a first, flawed</text>
<text x="88.0" y="123" font-size="9.5" text-anchor="middle" fill="#6a6d73">answer</text>
<rect x="196" y="74" width="128" height="58" rx="8" fill="#eaf0f6" stroke="#274b6d"/>
<text x="260.0" y="95" font-size="11.5" font-weight="700" text-anchor="middle" fill="#274b6d">self-critique</text>
<text x="260.0" y="111" font-size="9.5" text-anchor="middle" fill="#eaf0f6">"which principle</text>
<text x="260.0" y="123" font-size="9.5" text-anchor="middle" fill="#eaf0f6">does this break?"</text>
<rect x="368" y="74" width="128" height="58" rx="8" fill="#eaf0f6" stroke="#274b6d"/>
<text x="432.0" y="95" font-size="11.5" font-weight="700" text-anchor="middle" fill="#274b6d">revision</text>
<text x="432.0" y="111" font-size="9.5" text-anchor="middle" fill="#eaf0f6">rewrite to obey</text>
<text x="432.0" y="123" font-size="9.5" text-anchor="middle" fill="#eaf0f6">the constitution</text>
<rect x="540" y="74" width="128" height="58" rx="8" fill="#6b4f9c" stroke="none"/>
<text x="604.0" y="95" font-size="11.5" font-weight="700" text-anchor="middle" fill="#ffffff">SFT target</text>
<text x="604.0" y="111" font-size="9.5" text-anchor="middle" fill="#eaf0f6">train on the</text>
<text x="604.0" y="123" font-size="9.5" text-anchor="middle" fill="#eaf0f6">revised answer</text>
<path d="M 156 103.0 L 190 103.0" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#c1)"/>
<path d="M 328 103.0 L 362 103.0" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#c1)"/>
<path d="M 500 103.0 L 534 103.0" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#c1)"/>
<text x="24" y="196" font-size="10.5" font-weight="700" fill="#9c6b12">Phase 2 &#183; preferences: the model is the judge (RLAIF)</text>
<rect x="24" y="204" width="128" height="58" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<text x="88.0" y="225" font-size="11.5" font-weight="700" text-anchor="middle" fill="#17181b">two responses</text>
<text x="88.0" y="241" font-size="9.5" text-anchor="middle" fill="#6a6d73">sampled from</text>
<text x="88.0" y="253" font-size="9.5" text-anchor="middle" fill="#6a6d73">the model</text>
<rect x="196" y="204" width="128" height="58" rx="8" fill="#ffffff" stroke="#9c6b12"/>
<text x="260.0" y="225" font-size="11.5" font-weight="700" text-anchor="middle" fill="#9c6b12">AI judge</text>
<text x="260.0" y="241" font-size="9.5" text-anchor="middle" fill="#eaf0f6">picks the better</text>
<text x="260.0" y="253" font-size="9.5" text-anchor="middle" fill="#eaf0f6">per the constitution</text>
<rect x="368" y="204" width="128" height="58" rx="8" fill="#eaf0f6" stroke="#274b6d"/>
<text x="432.0" y="225" font-size="11.5" font-weight="700" text-anchor="middle" fill="#274b6d">preference pair</text>
<text x="432.0" y="241" font-size="9.5" text-anchor="middle" fill="#eaf0f6">chosen vs</text>
<text x="432.0" y="253" font-size="9.5" text-anchor="middle" fill="#eaf0f6">rejected</text>
<rect x="540" y="204" width="128" height="58" rx="8" fill="#9c6b12" stroke="none"/>
<text x="604.0" y="225" font-size="11.5" font-weight="700" text-anchor="middle" fill="#ffffff">DPO or RLHF</text>
<text x="604.0" y="241" font-size="9.5" text-anchor="middle" fill="#eaf0f6">the loss from</text>
<text x="604.0" y="253" font-size="9.5" text-anchor="middle" fill="#eaf0f6">this chapter</text>
<path d="M 156 233.0 L 190 233.0" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#c1)"/>
<path d="M 328 233.0 L 362 233.0" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#c1)"/>
<path d="M 500 233.0 L 534 233.0" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#c1)"/>
<defs><marker id="c1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
<text x="360.0" y="312" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">A written principle stands in for the human annotator, so the preference signal scales as cheaply as inference.</text>
</svg>