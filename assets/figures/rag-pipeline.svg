<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="the retrieve-augment-generate loop">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">RETRIEVE, AUGMENT, GENERATE</text>
<rect x="20.0" y="112.0" width="92.0" height="34.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="66.0" y="133.2" font-size="12" font-weight="400" text-anchor="middle" fill="#274b6d">user query</text>
<rect x="152" y="92" width="150" height="74" rx="9" fill="#ffffff" stroke="#cfcdc4"/>
<text x="227.0" y="119" font-size="14" font-weight="700" text-anchor="middle" fill="#17181b">Retrieve</text>
<text x="227.0" y="137" font-size="10.5" text-anchor="middle" fill="#6a6d73">embed the query,</text>
<text x="227.0" y="151" font-size="10.5" text-anchor="middle" fill="#6a6d73">search the index</text>
<rect x="338" y="92" width="150" height="74" rx="9" fill="#ffffff" stroke="#cfcdc4"/>
<text x="413.0" y="119" font-size="14" font-weight="700" text-anchor="middle" fill="#17181b">Augment</text>
<text x="413.0" y="137" font-size="10.5" text-anchor="middle" fill="#6a6d73">prompt + the</text>
<text x="413.0" y="151" font-size="10.5" text-anchor="middle" fill="#6a6d73">retrieved passages</text>
<rect x="524" y="92" width="128" height="74" rx="9" fill="#274b6d" stroke="none"/>
<text x="588.0" y="119" font-size="14" font-weight="700" text-anchor="middle" fill="#ffffff">Generate</text>
<text x="588.0" y="137" font-size="10.5" text-anchor="middle" fill="#eaf0f6">the model reads</text>
<text x="588.0" y="151" font-size="10.5" text-anchor="middle" fill="#eaf0f6">the context</text>
<rect x="668" y="92" width="96" height="74" rx="9" fill="#eaf0f6" stroke="#274b6d"/>
<text x="716.0" y="119" font-size="14" font-weight="700" text-anchor="middle" fill="#274b6d">answer</text>
<text x="716.0" y="137" font-size="10.5" text-anchor="middle" fill="#274b6d">grounded,</text>
<text x="716.0" y="151" font-size="10.5" text-anchor="middle" fill="#274b6d">with a citation</text>
<path d="M 112 129.0 L 146 129.0" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#rp)"/>
<path d="M 302 129.0 L 332 129.0" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#rp)"/>
<text x="320.0" y="84" font-size="9.5" text-anchor="middle" fill="#9c6b12" font-weight="600">top-k passages</text>
<path d="M 488 129.0 L 518 129.0" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#rp)"/>
<path d="M 652 129.0 L 662 129.0" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#rp)"/>
<rect x="152" y="224" width="150" height="50" rx="8" fill="#faf9f5" stroke="#cfcdc4"/>
<text x="227.0" y="245" font-size="11" font-weight="700" text-anchor="middle" fill="#3b3d42">knowledge store</text>
<text x="227.0" y="261" font-size="10" text-anchor="middle" fill="#6a6d73">millions of indexed chunks</text>
<path d="M 227.0 222 L 227.0 170" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#rp)"/>
<text x="390.0" y="292" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Facts live in the store, not the weights: re-index the corpus and the same model answers new questions.</text>
<defs><marker id="rp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
</svg>