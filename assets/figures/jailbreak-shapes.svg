<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 336" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="five jailbreak shapes converging on a model">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">WHAT JAILBREAKS EXPLOIT</text>
<rect x="24" y="56" width="250" height="42" rx="8" fill="#ffffff" stroke="#6b4f9c" stroke-width="1.3"/>
<rect x="24" y="56" width="4" height="42" rx="2" fill="#6b4f9c"/>
<text x="40" y="74" font-size="11.5" font-weight="700" fill="#17181b">Persona / role-play</text>
<text x="40" y="89" font-size="10" fill="#6a6d73">reframe the request as fiction</text>
<path d="M 278 77.0 C 360 77.0, 400 168, 452 168" fill="none" stroke="#6b4f9c" stroke-width="1.4" opacity="0.55" marker-end="url(#sjs_a)"/>
<rect x="24" y="110" width="250" height="42" rx="8" fill="#ffffff" stroke="#6b4f9c" stroke-width="1.3"/>
<rect x="24" y="110" width="4" height="42" rx="2" fill="#6b4f9c"/>
<text x="40" y="128" font-size="11.5" font-weight="700" fill="#17181b">Obfuscation / encoding</text>
<text x="40" y="143" font-size="10" fill="#6a6d73">hide intent the filter reads for</text>
<path d="M 278 131.0 C 360 131.0, 400 168, 452 168" fill="none" stroke="#6b4f9c" stroke-width="1.4" opacity="0.55" marker-end="url(#sjs_a)"/>
<rect x="24" y="164" width="250" height="42" rx="8" fill="#ffffff" stroke="#b04a3f" stroke-width="1.3"/>
<rect x="24" y="164" width="4" height="42" rx="2" fill="#b04a3f"/>
<text x="40" y="182" font-size="11.5" font-weight="700" fill="#17181b">Injection via content</text>
<text x="40" y="197" font-size="10" fill="#6a6d73">hostile text in a tool or document</text>
<path d="M 278 185.0 C 360 185.0, 400 168, 452 168" fill="none" stroke="#b04a3f" stroke-width="1.4" opacity="0.55" marker-end="url(#sjs_a)"/>
<rect x="24" y="218" width="250" height="42" rx="8" fill="#ffffff" stroke="#9c6b12" stroke-width="1.3"/>
<rect x="24" y="218" width="4" height="42" rx="2" fill="#9c6b12"/>
<text x="40" y="236" font-size="11.5" font-weight="700" fill="#17181b">Many-shot / long context</text>
<text x="40" y="251" font-size="10" fill="#6a6d73">flood the window with examples</text>
<path d="M 278 239.0 C 360 239.0, 400 168, 452 168" fill="none" stroke="#9c6b12" stroke-width="1.4" opacity="0.55" marker-end="url(#sjs_a)"/>
<rect x="24" y="272" width="250" height="42" rx="8" fill="#ffffff" stroke="#274b6d" stroke-width="1.3"/>
<rect x="24" y="272" width="4" height="42" rx="2" fill="#274b6d"/>
<text x="40" y="290" font-size="11.5" font-weight="700" fill="#17181b">Automated suffix</text>
<text x="40" y="305" font-size="10" fill="#6a6d73">gradient-optimized gibberish</text>
<path d="M 278 293.0 C 360 293.0, 400 168, 452 168" fill="none" stroke="#274b6d" stroke-width="1.4" opacity="0.55" marker-end="url(#sjs_a)"/>
<rect x="460" y="128" width="150" height="80" rx="12" fill="#274b6d"/>
<text x="535.0" y="162" font-size="13" font-weight="700" text-anchor="middle" fill="#ffffff">safety-trained</text>
<text x="535.0" y="180" font-size="13" font-weight="700" text-anchor="middle" fill="#ffffff">model</text>
<text x="535.0" y="296" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Alignment is a tendency, not a wall: every shape</text>
<text x="535.0" y="310" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">turns the model&#8217;s own competence against its rules.</text>
<defs><marker id="sjs_a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6a6d73"/></marker></defs>
</svg>