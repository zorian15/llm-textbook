<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 288" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="chat template with loss masked to the completion">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">ONE TRAINING EXAMPLE, AS THE MODEL SEES IT</text>
<rect x="30" y="66" width="116" height="30" rx="6" fill="#faf9f5" stroke="#cfcdc4"/>
<text x="88.0" y="85" font-size="11" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" text-anchor="middle" fill="#3b3d42">&lt;|system|&gt;</text>
<rect x="158" y="58" width="372" height="46" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<text x="174" y="85.0" font-size="11.5" fill="#3b3d42" font-weight="400">You are a helpful assistant.</text>
<rect x="30" y="132" width="116" height="30" rx="6" fill="#faf9f5" stroke="#cfcdc4"/>
<text x="88.0" y="151" font-size="11" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" text-anchor="middle" fill="#3b3d42">&lt;|user|&gt;</text>
<rect x="158" y="124" width="372" height="46" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<text x="174" y="151.0" font-size="11.5" fill="#3b3d42" font-weight="400">Is 51 prime?</text>
<rect x="30" y="198" width="116" height="30" rx="6" fill="#faf9f5" stroke="#cfcdc4"/>
<text x="88.0" y="217" font-size="11" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" text-anchor="middle" fill="#3b3d42">&lt;|assistant|&gt;</text>
<rect x="158" y="190" width="372" height="46" rx="8" fill="#eaf0f6" stroke="#274b6d"/>
<text x="174" y="217.0" font-size="11.5" fill="#274b6d" font-weight="600">No. 51 = 3 &#215; 17, so composite. &lt;|end|&gt;</text>
<path d="M 552 58 L 544 58 L 544 170 L 552 170" fill="none" stroke="#cfcdc4" stroke-width="1.4"/>
<text x="562" y="110.0" font-size="11" font-weight="700" fill="#6a6d73">prompt</text>
<text x="562" y="126.0" font-size="10.5" fill="#6a6d73">masked, no loss</text>
<path d="M 552 190 L 544 190 L 544 236 L 552 236" fill="none" stroke="#274b6d" stroke-width="1.4"/>
<text x="562" y="210.0" font-size="11" font-weight="700" fill="#274b6d">completion</text>
<text x="562" y="226.0" font-size="10.5" fill="#274b6d">loss here</text>
<text x="360.0" y="278" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">The template marks whose turn it is; the loss trains only the assistant tokens, including the end token that teaches it to stop.</text>
</svg>