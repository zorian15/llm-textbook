<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 224" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="The four stages that turn raw text into a shipped assistant.">
<text x="16" y="22" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1.1">WHAT YOU HAVE AFTER EACH STAGE</text>
<text x="90.0" y="44" font-size="10.5" font-style="italic" text-anchor="middle" fill="#274b6d">base model</text>
<rect x="16" y="54" width="148" height="96" rx="8" fill="#ffffff" stroke="#cfcdc4" stroke-width="1"/>
<rect x="16" y="54" width="4" height="96" rx="2" fill="#274b6d"/>
<text x="32" y="80" font-size="12.5" font-weight="700" fill="#17181b">Pretraining</text>
<text x="32" y="103" font-size="10.5" fill="#6a6d73">next-token prediction</text>
<text x="32" y="116" font-size="10.5" fill="#6a6d73">on trillions of tokens</text>
<path d="M 172 102.0 L 196 102.0" stroke="#cfcdc4" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="280.0" y="44" font-size="10.5" font-style="italic" text-anchor="middle" fill="#6b4f9c">instruct model</text>
<rect x="206" y="54" width="148" height="96" rx="8" fill="#ffffff" stroke="#cfcdc4" stroke-width="1"/>
<rect x="206" y="54" width="4" height="96" rx="2" fill="#6b4f9c"/>
<text x="222" y="80" font-size="12.5" font-weight="700" fill="#17181b">Supervised</text>
<text x="222" y="95" font-size="12.5" font-weight="700" fill="#17181b">fine-tuning</text>
<text x="222" y="118" font-size="10.5" fill="#6a6d73">imitate demonstrations</text>
<text x="222" y="131" font-size="10.5" fill="#6a6d73">of good answers</text>
<path d="M 362 102.0 L 386 102.0" stroke="#cfcdc4" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="470.0" y="44" font-size="10.5" font-style="italic" text-anchor="middle" fill="#9c6b12">aligned model</text>
<rect x="396" y="54" width="148" height="96" rx="8" fill="#ffffff" stroke="#cfcdc4" stroke-width="1"/>
<rect x="396" y="54" width="4" height="96" rx="2" fill="#9c6b12"/>
<text x="412" y="80" font-size="12.5" font-weight="700" fill="#17181b">Preference</text>
<text x="412" y="95" font-size="12.5" font-weight="700" fill="#17181b">optimization</text>
<text x="412" y="118" font-size="10.5" fill="#6a6d73">learn from rankings</text>
<text x="412" y="131" font-size="10.5" fill="#6a6d73">(RLHF, DPO)</text>
<path d="M 552 102.0 L 576 102.0" stroke="#cfcdc4" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="660.0" y="44" font-size="10.5" font-style="italic" text-anchor="middle" fill="#b04a3f">the product</text>
<rect x="586" y="54" width="148" height="96" rx="8" fill="#ffffff" stroke="#cfcdc4" stroke-width="1"/>
<rect x="586" y="54" width="4" height="96" rx="2" fill="#b04a3f"/>
<text x="602" y="80" font-size="12.5" font-weight="700" fill="#17181b">The harness</text>
<text x="602" y="103" font-size="10.5" fill="#6a6d73">system prompt, tools,</text>
<text x="602" y="116" font-size="10.5" fill="#6a6d73">retrieval, guardrails</text>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
<path d="M 16 172 L 16 178 L 544 178 L 544 172" fill="none" stroke="#cfcdc4" stroke-width="1"/>
<text x="280.0" y="194" font-size="10.5" text-anchor="middle" fill="#6a6d73">these change the weights</text>
<path d="M 586 172 L 586 178 L 734 178 L 734 172" fill="none" stroke="#cfcdc4" stroke-width="1"/>
<text x="660.0" y="194" font-size="10.5" text-anchor="middle" fill="#6a6d73">this does not</text>
</svg>