<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="SFT changes behavior not knowledge">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">SFT CHANGES BEHAVIOR, NOT KNOWLEDGE</text>
<circle cx="224" cy="182" r="116" fill="#eaf0f6" stroke="#274b6d" stroke-width="1.4"/>
<text x="224" y="92" font-size="12" font-weight="700" text-anchor="middle" fill="#274b6d">what the base</text>
<text x="224" y="108" font-size="12" font-weight="700" text-anchor="middle" fill="#274b6d">model knows</text>
<circle cx="180" cy="180" r="7" fill="#274b6d"/>
<path d="M 176.8 180 l 2.2 2.4 l 4.2 -4.8" fill="none" stroke="#ffffff" stroke-width="1.4"/>
<circle cx="250" cy="210" r="7" fill="#274b6d"/>
<path d="M 246.8 210 l 2.2 2.4 l 4.2 -4.8" fill="none" stroke="#ffffff" stroke-width="1.4"/>
<circle cx="208" cy="244" r="7" fill="#274b6d"/>
<path d="M 204.8 244 l 2.2 2.4 l 4.2 -4.8" fill="none" stroke="#ffffff" stroke-width="1.4"/>
<circle cx="392" cy="132" r="7" fill="#b04a3f"/>
<path d="M 389 129 l 6 6 M 395 129 l -6 6" stroke="#ffffff" stroke-width="1.3"/>
<circle cx="426" cy="196" r="7" fill="#b04a3f"/>
<path d="M 423 193 l 6 6 M 429 193 l -6 6" stroke="#ffffff" stroke-width="1.3"/>
<circle cx="398" cy="258" r="7" fill="#b04a3f"/>
<path d="M 395 255 l 6 6 M 401 255 l -6 6" stroke="#ffffff" stroke-width="1.3"/>
<circle cx="492" cy="116" r="7" fill="#274b6d"/>
<path d="M 488.8 116 l 2.2 2.4 l 4.2 -4.8" fill="none" stroke="#ffffff" stroke-width="1.4"/>
<text x="506" y="120" font-size="11" font-weight="700" fill="#274b6d">inside the boundary</text>
<text x="506" y="138" font-size="10.5" fill="#3b3d42">Demonstrations reinforce</text>
<text x="506" y="153" font-size="10.5" fill="#3b3d42">recall and formatting of</text>
<text x="506" y="168" font-size="10.5" fill="#3b3d42">facts already learned.</text>
<circle cx="492" cy="204" r="7" fill="#b04a3f"/>
<path d="M 489 201 l 6 6 M 495 201 l -6 6" stroke="#ffffff" stroke-width="1.3"/>
<text x="506" y="208" font-size="11" font-weight="700" fill="#b04a3f">outside the boundary</text>
<text x="506" y="226" font-size="10.5" fill="#3b3d42">SFT cannot add the fact; it</text>
<text x="506" y="241" font-size="10.5" fill="#3b3d42">teaches the model to guess</text>
<text x="506" y="256" font-size="10.5" fill="#3b3d42">just as confidently.</text>
<text x="340.0" y="308" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Fine-tuning on facts beyond the model&#8217;s reach trains away its hesitation, and hallucination is the seed you plant.</text>
</svg>