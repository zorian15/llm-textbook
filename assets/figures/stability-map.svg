<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 296" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Four training instabilities, their mechanisms, and their fixes.">
<text x="20.0" y="28.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">SYMPTOM</text>
<text x="250.0" y="28.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">MECHANISM</text>
<text x="490.0" y="28.0" font-size="11" font-weight="700" fill="#274b6d" letter-spacing="1">FIX</text>
<defs><marker id="stabarrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
<rect x="20.0" y="44.0" width="190.0" height="40.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="115.0" y="68.0" font-size="11.5" font-weight="600" text-anchor="middle" fill="#b04a3f">Rare giant gradient</text>
<text x="250" y="68.0" font-size="10.5" fill="#6a6d73">one outlier batch takes a wrecking step</text>
<rect x="490.0" y="44.0" width="170.0" height="40.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="575.0" y="68.0" font-size="11.5" font-weight="700" text-anchor="middle" fill="#274b6d">Gradient clipping</text>
<path d="M 216 64.0 L 238 64.0" stroke="#cfcdc4" stroke-width="1.2" marker-end="url(#stabarrow)"/>
<rect x="20.0" y="102.0" width="190.0" height="40.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="115.0" y="126.0" font-size="11.5" font-weight="600" text-anchor="middle" fill="#b04a3f">Output logits drift up</text>
<text x="250" y="126.0" font-size="10.5" fill="#6a6d73">nothing pins the softmax normalizer</text>
<rect x="490.0" y="102.0" width="170.0" height="40.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="575.0" y="126.0" font-size="11.5" font-weight="700" text-anchor="middle" fill="#274b6d">Z-loss</text>
<path d="M 216 122.0 L 238 122.0" stroke="#cfcdc4" stroke-width="1.2" marker-end="url(#stabarrow)"/>
<rect x="20.0" y="160.0" width="190.0" height="40.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="115.0" y="184.0" font-size="11.5" font-weight="600" text-anchor="middle" fill="#b04a3f">Attention saturates</text>
<text x="250" y="184.0" font-size="10.5" fill="#6a6d73">QK logits grow with scale</text>
<rect x="490.0" y="160.0" width="170.0" height="40.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="575.0" y="184.0" font-size="11.5" font-weight="700" text-anchor="middle" fill="#274b6d">QK-norm</text>
<path d="M 216 180.0 L 238 180.0" stroke="#cfcdc4" stroke-width="1.2" marker-end="url(#stabarrow)"/>
<rect x="20.0" y="218.0" width="190.0" height="40.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="115.0" y="242.0" font-size="11.5" font-weight="600" text-anchor="middle" fill="#b04a3f">Variance grows with depth</text>
<text x="250" y="242.0" font-size="10.5" fill="#6a6d73">residual stream accumulates each block</text>
<rect x="490.0" y="218.0" width="170.0" height="40.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="575.0" y="242.0" font-size="11.5" font-weight="700" text-anchor="middle" fill="#274b6d">Scaled initialization</text>
<path d="M 216 238.0 L 238 238.0" stroke="#cfcdc4" stroke-width="1.2" marker-end="url(#stabarrow)"/>
</svg>