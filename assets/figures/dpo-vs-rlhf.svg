<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="RLHF pipeline versus the DPO path">
<rect x="22.0" y="114.0" width="96.0" height="60.0" rx="8" fill="#eaf0f6" stroke="#274b6d"/>
<text x="70.0" y="136.0" font-size="12.5" font-weight="700" text-anchor="middle" fill="#274b6d">preferences</text>
<text x="70.0" y="153.0" font-size="10" text-anchor="middle" fill="#eaf0f6">chosen vs</text>
<text x="70.0" y="166.0" font-size="10" text-anchor="middle" fill="#eaf0f6">rejected pairs</text>
<text x="150.0" y="32.0" font-size="11" font-weight="700" fill="#b04a3f" letter-spacing="1">RLHF  (CHAPTER 11):  TWO EXTRA STAGES</text>
<rect x="150.0" y="44.0" width="150.0" height="60.0" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<text x="225.0" y="66.0" font-size="12.5" font-weight="700" text-anchor="middle" fill="#17181b">reward model</text>
<text x="225.0" y="83.0" font-size="10" text-anchor="middle" fill="#6a6d73">fit Bradley-Terry</text>
<text x="225.0" y="96.0" font-size="10" text-anchor="middle" fill="#6a6d73">scores</text>
<rect x="330.0" y="44.0" width="150.0" height="60.0" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<text x="405.0" y="66.0" font-size="12.5" font-weight="700" text-anchor="middle" fill="#17181b">PPO loop</text>
<text x="405.0" y="83.0" font-size="10" text-anchor="middle" fill="#6a6d73">sample, score,</text>
<text x="405.0" y="96.0" font-size="10" text-anchor="middle" fill="#6a6d73">update with KL leash</text>
<rect x="520.0" y="44.0" width="150.0" height="60.0" rx="8" fill="#274b6d" stroke="none"/>
<text x="595.0" y="66.0" font-size="12.5" font-weight="700" text-anchor="middle" fill="#ffffff">aligned policy</text>
<text x="595.0" y="83.0" font-size="10" text-anchor="middle" fill="#eaf0f6">the tuned model</text>
<text x="150.0" y="184.0" font-size="11" font-weight="700" fill="#274b6d" letter-spacing="1">DPO:  ONE CLASSIFICATION-STYLE LOSS</text>
<rect x="150.0" y="196.0" width="330.0" height="60.0" rx="8" fill="#eaf0f6" stroke="#274b6d"/>
<text x="315.0" y="218.0" font-size="12.5" font-weight="700" text-anchor="middle" fill="#274b6d">direct preference loss</text>
<text x="315.0" y="235.0" font-size="10" text-anchor="middle" fill="#eaf0f6">raise log-prob of chosen, lower it for rejected,</text>
<text x="315.0" y="248.0" font-size="10" text-anchor="middle" fill="#eaf0f6">anchored to a frozen reference model</text>
<rect x="520.0" y="196.0" width="150.0" height="60.0" rx="8" fill="#274b6d" stroke="none"/>
<text x="595.0" y="218.0" font-size="12.5" font-weight="700" text-anchor="middle" fill="#ffffff">aligned policy</text>
<text x="595.0" y="235.0" font-size="10" text-anchor="middle" fill="#eaf0f6">the tuned model</text>
<path d="M 118 144.0 C 132 144.0, 132 74.0, 144 74.0" fill="none" stroke="#b04a3f" stroke-width="1.5" marker-end="url(#p1)"/>
<path d="M 118 144.0 C 132 144.0, 132 226.0, 144 226.0" fill="none" stroke="#274b6d" stroke-width="1.5" marker-end="url(#p2)"/>
<path d="M 304 74.0 L 324 74.0" stroke="#b04a3f" stroke-width="1.5" marker-end="url(#p1)"/>
<path d="M 484 74.0 L 514 74.0" stroke="#b04a3f" stroke-width="1.5" marker-end="url(#p1)"/>
<path d="M 484 226.0 L 514 226.0" stroke="#274b6d" stroke-width="1.5" marker-end="url(#p2)"/>
<text x="360.0" y="292" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Same data, same goal. DPO shows the reward model and the RL loop were an indirection you can skip.</text>
<defs><marker id="p1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b04a3f"/></marker></defs>
<defs><marker id="p2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#274b6d"/></marker></defs>
</svg>