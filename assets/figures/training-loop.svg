<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="the training loop">
<text x="40.0" y="34.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">ONE STEP OF TRAINING</text>
<rect x="40" y="74" width="128" height="58" rx="9" fill="#eaf0f6" stroke="#274b6d"/>
<text x="104.0" y="100" font-size="14" font-weight="700" text-anchor="middle" fill="#274b6d">batch</text>
<text x="104.0" y="118" font-size="10.5" text-anchor="middle" fill="#6a6d73">inputs + targets</text>
<path d="M 174 103.0 L 222 103.0" stroke="#274b6d" stroke-width="1.8" marker-end="url(#fwd)"/>
<rect x="228" y="74" width="128" height="58" rx="9" fill="#ffffff" stroke="#cfcdc4"/>
<text x="292.0" y="100" font-size="14" font-weight="700" text-anchor="middle" fill="#17181b">model</text>
<text x="292.0" y="118" font-size="10.5" text-anchor="middle" fill="#6a6d73">predict logits</text>
<path d="M 362 103.0 L 410 103.0" stroke="#274b6d" stroke-width="1.8" marker-end="url(#fwd)"/>
<rect x="416" y="74" width="128" height="58" rx="9" fill="#ffffff" stroke="#cfcdc4"/>
<text x="480.0" y="100" font-size="14" font-weight="700" text-anchor="middle" fill="#17181b">loss</text>
<text x="480.0" y="118" font-size="10.5" text-anchor="middle" fill="#6a6d73">cross-entropy</text>
<text x="292.0" y="66" font-size="10.5" text-anchor="middle" fill="#274b6d">forward pass</text>
<path d="M 480.0 136 L 480.0 178 L 104.0 178 L 104.0 136" fill="none" stroke="#b04a3f" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#bwd)"/>
<text x="292.0" y="196" font-size="11" text-anchor="middle" fill="#b04a3f">backward pass: gradient of the loss w.r.t. every parameter</text>
<text x="104.0" y="170" font-size="10" text-anchor="middle" fill="#b04a3f">update</text>
<text x="330.0" y="242" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Every model in this book is trained by running this loop millions of times.</text>
<defs><marker id="fwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#274b6d"/></marker></defs>
<defs><marker id="bwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b04a3f"/></marker></defs>
</svg>