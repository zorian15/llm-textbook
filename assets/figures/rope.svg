<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="rotary position embeddings as clock hands">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">POSITION AS ROTATION</text>
<circle cx="110" cy="120" r="40" fill="#ffffff" stroke="#cfcdc4" stroke-width="1.5"/>
<line x1="110" y1="120" x2="146.3" y2="103.1" stroke="#274b6d" stroke-width="2.5" stroke-linecap="round"/>
<circle cx="110" cy="120" r="3" fill="#274b6d"/>
<text x="110" y="180" font-size="11" text-anchor="middle" fill="#17181b" font-weight="600">“cat”</text>
<text x="110" y="194" font-size="9.5" text-anchor="middle" fill="#6a6d73">position 1</text>
<circle cx="300" cy="120" r="40" fill="#ffffff" stroke="#cfcdc4" stroke-width="1.5"/>
<line x1="300" y1="120" x2="296.5" y2="80.2" stroke="#274b6d" stroke-width="2.5" stroke-linecap="round"/>
<circle cx="300" cy="120" r="3" fill="#274b6d"/>
<text x="300" y="180" font-size="11" text-anchor="middle" fill="#17181b" font-weight="600">“cat”</text>
<text x="300" y="194" font-size="9.5" text-anchor="middle" fill="#6a6d73">position 3</text>
<circle cx="490" cy="120" r="40" fill="#ffffff" stroke="#cfcdc4" stroke-width="1.5"/>
<line x1="490" y1="120" x2="451.4" y2="109.6" stroke="#274b6d" stroke-width="2.5" stroke-linecap="round"/>
<circle cx="490" cy="120" r="3" fill="#274b6d"/>
<text x="490" y="180" font-size="11" text-anchor="middle" fill="#17181b" font-weight="600">“cat”</text>
<text x="490" y="194" font-size="9.5" text-anchor="middle" fill="#6a6d73">position 6</text>
<text x="310.0" y="256" font-size="11" text-anchor="middle" fill="#274b6d">each position turns the hand further; the score depends on the <tspan font-weight="700">angle between</tspan> two hands</text>
<text x="310.0" y="274" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">so it encodes how far apart two tokens are (relative position), not where each sits.</text>
</svg>