<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="the prompt-and-pray retry loop">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">COAXING JSON BY PROMPTING ALONE</text>
<rect x="24.0" y="118.0" width="118.0" height="46.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="83.0" y="145.2" font-size="12" font-weight="400" text-anchor="middle" fill="#274b6d">prompt:</text>
<text x="83" y="152" font-size="10.5" text-anchor="middle" fill="#274b6d">"reply as JSON"</text>
<rect x="186.0" y="116.0" width="92.0" height="50.0" rx="6" fill="#274b6d" stroke="none"/>
<text x="232.0" y="145.2" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">model</text>
<path d="M 148 141 L 180 141" stroke="#cfcdc4" stroke-width="1.5" marker-end="url(#r1)"/>
<rect x="322" y="112" width="150" height="58" rx="8" fill="#faf9f5" stroke="#cfcdc4"/>
<rect x="322" y="112" width="4" height="58" rx="2" fill="#b04a3f"/>
<text x="338" y="136" font-size="11.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">{"age": 12,}</text>
<text x="338" y="156" font-size="10" fill="#b04a3f">trailing comma</text>
<path d="M 284 141 L 316 141" stroke="#cfcdc4" stroke-width="1.5" marker-end="url(#r1)"/>
<path d="M 560 111 L 594 141 L 560 171 L 526 141 Z" fill="#ffffff" stroke="#cfcdc4"/>
<text x="560" y="145" font-size="11" text-anchor="middle" fill="#3b3d42" font-weight="600">parse?</text>
<path d="M 478 141 L 520 141" stroke="#cfcdc4" stroke-width="1.5" marker-end="url(#r1)"/>
<rect x="502.0" y="236.0" width="116.0" height="40.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="560.0" y="259.7" font-size="10.5" font-weight="400" text-anchor="middle" fill="#274b6d">downstream system</text>
<path d="M 560 171 L 560 230" stroke="#274b6d" stroke-width="1.6" marker-end="url(#r1ok)"/>
<text x="568" y="203.5" font-size="10" fill="#274b6d">valid</text>
<path d="M 526 141 C 420 240, 232.0 240, 232.0 172" fill="none" stroke="#b04a3f" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#r1bad)"/>
<text x="400" y="256" font-size="10.5" text-anchor="middle" fill="#b04a3f">invalid: retry — another forward pass</text>
<defs><marker id="r1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
<defs><marker id="r1ok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#274b6d"/></marker></defs>
<defs><marker id="r1bad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b04a3f"/></marker></defs>
</svg>