<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="A training timeline with failures rewinding to checkpoints.">
<text x="30.0" y="34.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">ONE TRAINING RUN, WALL-CLOCK TIME</text>
<defs><marker id="timearrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3b3d42"/></marker></defs>
<path d="M 30 120 L 664 120" stroke="#3b3d42" stroke-width="2" marker-end="url(#timearrow)"/>
<rect x="230" y="111" width="55" height="18" fill="#b04a3f" opacity="0.16"/>
<rect x="530" y="111" width="55" height="18" fill="#b04a3f" opacity="0.16"/>
<path d="M 30 113 L 37 120 L 30 127 L 23 120 Z" fill="#274b6d"/>
<path d="M 130 113 L 137 120 L 130 127 L 123 120 Z" fill="#274b6d"/>
<path d="M 230 113 L 237 120 L 230 127 L 223 120 Z" fill="#274b6d"/>
<path d="M 330 113 L 337 120 L 330 127 L 323 120 Z" fill="#274b6d"/>
<path d="M 430 113 L 437 120 L 430 127 L 423 120 Z" fill="#274b6d"/>
<path d="M 530 113 L 537 120 L 530 127 L 523 120 Z" fill="#274b6d"/>
<path d="M 630 113 L 637 120 L 630 127 L 623 120 Z" fill="#274b6d"/>
<text x="30" y="148" font-size="10" fill="#274b6d">checkpoints</text>
<text x="285" y="125" font-size="16" font-weight="700" text-anchor="middle" fill="#b04a3f">&#215;</text>
<text x="285" y="78" font-size="10" text-anchor="middle" fill="#b04a3f">failure</text>
<path d="M 285 106 Q 257.5 68, 234 106" fill="none" stroke="#b04a3f" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#rewindarrow)"/>
<text x="585" y="125" font-size="16" font-weight="700" text-anchor="middle" fill="#b04a3f">&#215;</text>
<text x="585" y="78" font-size="10" text-anchor="middle" fill="#b04a3f">failure</text>
<path d="M 585 106 Q 557.5 68, 534 106" fill="none" stroke="#b04a3f" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#rewindarrow)"/>
<defs><marker id="rewindarrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b04a3f"/></marker></defs>
<text x="257.5" y="148" font-size="10" text-anchor="middle" fill="#b04a3f">replayed work</text>
<text x="340.0" y="190" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Each failure destroys everything since the last checkpoint.</text>
<text x="340.0" y="206" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Cadence is a bet: rare checkpoints risk hours, frequent ones throttle the run with writes.</text>
</svg>