<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="a shared prefix cached once at the root of a tree">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">PREFIX CACHE AS A SHARED TREE</text>
<rect x="210" y="58" width="200" height="44" rx="8" fill="#274b6d" stroke="none"/>
<text x="310.0" y="78" font-size="12" font-weight="700" text-anchor="middle" fill="#ffffff">shared system prompt</text>
<text x="310.0" y="94" font-size="10" text-anchor="middle" fill="#eaf0f6">KV computed once, cached</text>
<path d="M 310.0 102 C 310.0 144, 145.0 122, 145.0 168" fill="none" stroke="#cfcdc4" stroke-width="1.5"/>
<rect x="70" y="168" width="150" height="40" rx="8" fill="#ffffff" stroke="#6b4f9c"/>
<rect x="70" y="168" width="4" height="40" rx="2" fill="#6b4f9c"/>
<text x="147.0" y="186" font-size="11" font-weight="700" text-anchor="middle" fill="#17181b">user A turn</text>
<text x="147.0" y="201" font-size="9.5" text-anchor="middle" fill="#6a6d73">only this part is new</text>
<path d="M 310.0 102 C 310.0 144, 325.0 122, 325.0 168" fill="none" stroke="#cfcdc4" stroke-width="1.5"/>
<rect x="250" y="168" width="150" height="40" rx="8" fill="#ffffff" stroke="#9c6b12"/>
<rect x="250" y="168" width="4" height="40" rx="2" fill="#9c6b12"/>
<text x="327.0" y="186" font-size="11" font-weight="700" text-anchor="middle" fill="#17181b">user B turn</text>
<text x="327.0" y="201" font-size="9.5" text-anchor="middle" fill="#6a6d73">only this part is new</text>
<path d="M 310.0 102 C 310.0 144, 505.0 122, 505.0 168" fill="none" stroke="#cfcdc4" stroke-width="1.5"/>
<rect x="430" y="168" width="150" height="40" rx="8" fill="#ffffff" stroke="#b04a3f"/>
<rect x="430" y="168" width="4" height="40" rx="2" fill="#b04a3f"/>
<text x="507.0" y="186" font-size="11" font-weight="700" text-anchor="middle" fill="#17181b">user C turn</text>
<text x="507.0" y="201" font-size="9.5" text-anchor="middle" fill="#6a6d73">only this part is new</text>
<text x="310.0" y="274" font-size="10.5" text-anchor="middle" fill="#3b3d42">The long common prefix is prefilled a single time; each request pays only for its own suffix.</text>
<text x="310.0" y="290" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">This is why a stable system prompt is nearly free after the first request that warms it.</text>
</svg>