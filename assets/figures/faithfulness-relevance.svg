<text x="429.0" y="253.5" font-size="12.5" font-weight="600" text-anchor="middle" fill="#9c6b12">ignored:</text>
<text x="429.0" y="271.5" font-size="12.5" font-weight="600" text-anchor="middle" fill="#9c6b12">confabulation</text>
