<text x="330.0" y="346" font-size="11.5" font-weight="700" text-anchor="middle" fill="#3b3d42">Retrieved context relevant?</text>
<text x="231.0" y="332" font-size="10.5" text-anchor="middle" fill="#6a6d73">No</text>
<text x="429.0" y="332" font-size="10.5" text-anchor="middle" fill="#6a6d73">Yes</text>
<text x="26" y="191.0" font-size="11.5" font-weight="700" fill="#3b3d42" text-anchor="middle" transform="rotate(-90 26 191.0)">Answer faithful to context?</text>
<text x="122" y="132.5" font-size="10.5" text-anchor="end" fill="#6a6d73">Yes</text>
