<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="faithfulness against retrieval relevance">
