<text x="231.0" y="244.5" font-size="12.5" font-weight="700" text-anchor="middle" fill="#6a6d73">Ungrounded</text>
<text x="231.0" y="262.5" font-size="12.5" font-weight="600" text-anchor="middle" fill="#6a6d73">hallucination</text>
