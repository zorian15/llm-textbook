<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="TTFT set by prefill, TPOT set by decode">
<text x="28.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">ONE REQUEST, TWO CLOCKS</text>
<path d="M 60 176 L 640 176" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#t1)"/>
<text x="640" y="198" font-size="10.5" text-anchor="end" fill="#6a6d73">wall-clock time &#8594;</text>
<line x1="60" y1="114" x2="60" y2="182" stroke="#3b3d42" stroke-width="1"/>
<text x="60" y="108" font-size="10.5" text-anchor="middle" fill="#3b3d42">request arrives</text>
<rect x="60" y="136" width="150" height="34" rx="6" fill="#274b6d" stroke="none"/>
<text x="135.0" y="158" font-size="12" font-weight="700" text-anchor="middle" fill="#ffffff">prefill the prompt</text>
<rect x="210" y="137" width="34" height="32" rx="6" fill="#9c6b12" stroke="#9c6b12"/>
<text x="227" y="158" font-size="11" font-weight="700" text-anchor="middle" fill="#ffffff">t1</text>
<rect x="268" y="137" width="34" height="32" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="285" y="158" font-size="11" font-weight="700" text-anchor="middle" fill="#274b6d">t2</text>
<rect x="326" y="137" width="34" height="32" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="343" y="158" font-size="11" font-weight="700" text-anchor="middle" fill="#274b6d">t3</text>
<rect x="384" y="137" width="34" height="32" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="401" y="158" font-size="11" font-weight="700" text-anchor="middle" fill="#274b6d">t4</text>
<rect x="442" y="137" width="34" height="32" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="459" y="158" font-size="11" font-weight="700" text-anchor="middle" fill="#274b6d">t5</text>
<rect x="500" y="137" width="34" height="32" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="517" y="158" font-size="11" font-weight="700" text-anchor="middle" fill="#274b6d">t6</text>
<rect x="558" y="137" width="34" height="32" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="575" y="158" font-size="11" font-weight="700" text-anchor="middle" fill="#274b6d">t7</text>
<path d="M 60 202 L 227 202" stroke="#6b4f9c" stroke-width="1.6" marker-start="url(#t2)" marker-end="url(#t2)"/>
<text x="135.0" y="220" font-size="11" font-weight="700" text-anchor="middle" fill="#6b4f9c">TTFT</text>
<text x="135.0" y="234" font-size="9.5" text-anchor="middle" fill="#6a6d73">set by prefill</text>
<path d="M 343 122 L 401 122" stroke="#9c6b12" stroke-width="1.6" marker-start="url(#t3)" marker-end="url(#t3)"/>
<text x="372.0" y="116" font-size="11" font-weight="700" text-anchor="middle" fill="#9c6b12">TPOT</text>
<text x="340.0" y="258" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">A user feels two delays: the wait for the first word, then the pace of the rest. They have different cures.</text>
<defs><marker id="t1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
<defs><marker id="t2" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6b4f9c"/></marker></defs>
<defs><marker id="t3" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9c6b12"/></marker></defs>
</svg>