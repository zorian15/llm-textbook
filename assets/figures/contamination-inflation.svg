<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="leaked test data inflates a benchmark score">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">CONTAMINATION</text>
<rect x="24" y="70" width="176" height="150" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<text x="112" y="90" font-size="11" text-anchor="middle" fill="#6a6d73" font-weight="700" letter-spacing="1">TRAINING CORPUS</text>
<rect x="40" y="104" width="144" height="12" rx="3" fill="#e4e3dd" opacity="0.55"/>
<rect x="40" y="126" width="144" height="12" rx="3" fill="#e4e3dd" opacity="0.55"/>
<rect x="40" y="148" width="144" height="12" rx="3" fill="#b04a3f" opacity="0.9"/>
<rect x="40" y="170" width="144" height="12" rx="3" fill="#e4e3dd" opacity="0.55"/>
<rect x="40" y="192" width="144" height="12" rx="3" fill="#e4e3dd" opacity="0.55"/>
<text x="112" y="236" font-size="10" text-anchor="middle" fill="#b04a3f">one row is a test question</text>
<path d="M 208 145 C 250 145, 270 145, 330 150" fill="none" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#m2)"/>
<rect x="360" y="113.9" width="68" height="96.1" rx="4" fill="#274b6d"/>
<text x="394.0" y="105.9" font-size="14" font-weight="700" text-anchor="middle" fill="#274b6d">62%</text>
<text x="394.0" y="226.0" font-size="10.5" text-anchor="middle" fill="#6a6d73">held-out</text>
<rect x="490" y="73.6" width="68" height="136.4" rx="4" fill="#b04a3f"/>
<text x="524.0" y="65.6" font-size="14" font-weight="700" text-anchor="middle" fill="#b04a3f">88%</text>
<text x="524.0" y="226.0" font-size="10.5" text-anchor="middle" fill="#6a6d73">contaminated</text>
<text x="524.0" y="39.6" font-size="10.5" text-anchor="middle" fill="#b04a3f" font-weight="700">+26 recalled,</text>
<text x="524.0" y="52.6" font-size="10.5" text-anchor="middle" fill="#b04a3f" font-weight="700">not learned</text>
<text x="310.0" y="292.0" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">The inflated number still looks like an accuracy; it now measures memory.</text>
<defs><marker id="m2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
</svg>