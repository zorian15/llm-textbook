<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="serving many LoRA adapters over one base">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">ONE BASE, MANY ADAPTERS</text>
<rect x="24.0" y="66.0" width="120.0" height="40.0" rx="6" fill="#ffffff" stroke="#9c6b12"/>
<text x="84.0" y="89.8" font-size="11" font-weight="600" text-anchor="middle" fill="#9c6b12">request → A</text>
<rect x="24.0" y="138.0" width="120.0" height="40.0" rx="6" fill="#ffffff" stroke="#6b4f9c"/>
<text x="84.0" y="161.8" font-size="11" font-weight="600" text-anchor="middle" fill="#6b4f9c">request → B</text>
<rect x="24.0" y="210.0" width="120.0" height="40.0" rx="6" fill="#ffffff" stroke="#b04a3f"/>
<text x="84.0" y="233.8" font-size="11" font-weight="600" text-anchor="middle" fill="#b04a3f">request → C</text>
<rect x="296" y="74" width="158" height="168" rx="12" fill="#274b6d"/>
<text x="375.0" y="140" font-size="14" font-weight="700" text-anchor="middle" fill="#ffffff">shared base</text>
<text x="375.0" y="162" font-size="11" text-anchor="middle" fill="#eaf0f6">one copy in GPU</text>
<text x="375.0" y="184" font-size="10.5" text-anchor="middle" fill="#eaf0f6">forward computed once</text>
<rect x="316" y="62" width="30" height="18" rx="4" fill="#9c6b12" stroke="none"/>
<text x="331" y="75" font-size="10" font-weight="700" text-anchor="middle" fill="#ffffff">A</text>
<path d="M 148 86 C 220 86, 240 158.0, 290 158.0" fill="none" stroke="#9c6b12" stroke-width="1.6" opacity="0.8" marker-end="url(#s1)"/>
<rect x="356" y="62" width="30" height="18" rx="4" fill="#6b4f9c" stroke="none"/>
<text x="371" y="75" font-size="10" font-weight="700" text-anchor="middle" fill="#ffffff">B</text>
<path d="M 148 158 C 220 158, 240 158.0, 290 158.0" fill="none" stroke="#6b4f9c" stroke-width="1.6" opacity="0.8" marker-end="url(#s1)"/>
<rect x="396" y="62" width="30" height="18" rx="4" fill="#b04a3f" stroke="none"/>
<text x="411" y="75" font-size="10" font-weight="700" text-anchor="middle" fill="#ffffff">C</text>
<path d="M 148 230 C 220 230, 240 158.0, 290 158.0" fill="none" stroke="#b04a3f" stroke-width="1.6" opacity="0.8" marker-end="url(#s1)"/>
<text x="375.0" y="52" font-size="10" text-anchor="middle" fill="#6a6d73">few-MB adapters</text>
<rect x="536.0" y="66.0" width="120.0" height="40.0" rx="6" fill="#eaf0f6" stroke="#9c6b12"/>
<text x="596.0" y="89.8" font-size="11" font-weight="600" text-anchor="middle" fill="#9c6b12">output A</text>
<path d="M 460 158.0 C 500 158.0, 510 86, 532 86" fill="none" stroke="#9c6b12" stroke-width="1.4" opacity="0.7" marker-end="url(#s1)"/>
<rect x="536.0" y="138.0" width="120.0" height="40.0" rx="6" fill="#eaf0f6" stroke="#6b4f9c"/>
<text x="596.0" y="161.8" font-size="11" font-weight="600" text-anchor="middle" fill="#6b4f9c">output B</text>
<path d="M 460 158.0 C 500 158.0, 510 158, 532 158" fill="none" stroke="#6b4f9c" stroke-width="1.4" opacity="0.7" marker-end="url(#s1)"/>
<rect x="536.0" y="210.0" width="120.0" height="40.0" rx="6" fill="#eaf0f6" stroke="#b04a3f"/>
<text x="596.0" y="233.8" font-size="11" font-weight="600" text-anchor="middle" fill="#b04a3f">output C</text>
<path d="M 460 158.0 C 500 158.0, 510 230, 532 230" fill="none" stroke="#b04a3f" stroke-width="1.4" opacity="0.7" marker-end="url(#s1)"/>
<text x="340.0" y="290" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">S-LoRA batches thousands of adapters against a single base copy, at throughput near the unadapted model.</text>
<defs><marker id="s1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
</svg>