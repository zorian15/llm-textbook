<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="the tool-use loop">
<text x="28.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">THE TOOL-USE LOOP</text>
<rect x="28" y="54" width="132" height="50" rx="10" fill="#eaf0f6" stroke="#274b6d"/>
<text x="94.0" y="76.0" font-size="14" font-weight="700" text-anchor="middle" fill="#274b6d">user</text>
<text x="94.0" y="93.0" font-size="10" text-anchor="middle" fill="#6a6d73">sends a request</text>
<rect x="250" y="98" width="152" height="78" rx="10" fill="#274b6d" stroke="none"/>
<text x="326.0" y="134.0" font-size="14" font-weight="700" text-anchor="middle" fill="#ffffff">model</text>
<text x="326.0" y="151.0" font-size="10" text-anchor="middle" fill="#eaf0f6">emits only text</text>
<rect x="486" y="98" width="152" height="78" rx="10" fill="#ffffff" stroke="#cfcdc4"/>
<text x="562.0" y="134.0" font-size="14" font-weight="700" text-anchor="middle" fill="#17181b">harness</text>
<text x="562.0" y="151.0" font-size="10" text-anchor="middle" fill="#6a6d73">runs real code</text>
<rect x="486" y="240" width="152" height="56" rx="10" fill="#ffffff" stroke="#cfcdc4"/>
<text x="562.0" y="265.0" font-size="14" font-weight="700" text-anchor="middle" fill="#3b3d42">the tool</text>
<text x="562.0" y="282.0" font-size="10" text-anchor="middle" fill="#6a6d73">API, DB, shell, ...</text>
<rect x="250" y="240" width="152" height="56" rx="10" fill="#eaf0f6" stroke="#274b6d"/>
<text x="326.0" y="265.0" font-size="14" font-weight="700" text-anchor="middle" fill="#274b6d">final answer</text>
<text x="326.0" y="282.0" font-size="10" text-anchor="middle" fill="#6a6d73">no tool needed</text>
<path d="M 160 82 C 200 92, 214 110, 246 122" fill="none" stroke="#274b6d" stroke-width="1.8" marker-end="url(#tl_req)"/>
<path d="M 402 122 L 480 122" fill="none" stroke="#9c6b12" stroke-width="2" marker-end="url(#tl_call)"/>
<text x="441" y="112" font-size="10" text-anchor="middle" fill="#9c6b12" font-weight="600">tool call</text>
<text x="441" y="166" font-size="9.5" text-anchor="middle" fill="#6a6d73">name + JSON args</text>
<path d="M 480 152 L 408 152" fill="none" stroke="#6b4f9c" stroke-width="2" marker-end="url(#tl_res)"/>
<text x="444" y="146" font-size="10" text-anchor="middle" fill="#6b4f9c" font-weight="600">result</text>
<path d="M 546 176 L 546 236" fill="none" stroke="#cfcdc4" stroke-width="1.8" marker-end="url(#tl_grey)"/>
<path d="M 580 236 L 580 176" fill="none" stroke="#cfcdc4" stroke-width="1.8" marker-end="url(#tl_grey)"/>
<text x="520" y="212" font-size="9.5" text-anchor="end" fill="#6a6d73">execute</text>
<text x="606" y="212" font-size="9.5" fill="#6a6d73">raw result</text>
<path d="M 326 176 L 326 236" fill="none" stroke="#274b6d" stroke-width="1.8" marker-end="url(#tl_req)"/>
<text x="360.0" y="328" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">The model proposes; the harness disposes. Only the harness ever touches the outside world.</text>
<defs><marker id="tl_req" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#274b6d"/></marker></defs>
<defs><marker id="tl_call" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9c6b12"/></marker></defs>
<defs><marker id="tl_res" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6b4f9c"/></marker></defs>
<defs><marker id="tl_grey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
</svg>