<rect x="552" y="138" width="96" height="20" rx="4" fill="#f0efe9" stroke="#e4e3dd"/>
<text x="562" y="152" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#6a6d73">}</text>
<text x="636" y="152" font-size="11" text-anchor="end" fill="#cfcdc4">&#215;</text>
