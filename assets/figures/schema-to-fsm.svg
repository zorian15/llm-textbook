<text x="36" y="76" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">{</text>
<text x="36" y="92" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">  "type":"object",</text>
