<text x="36" y="140" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">      "type":"boolean"</text>
<text x="36" y="156" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">    }</text>
<text x="36" y="172" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">  }</text>
<text x="36" y="188" font-size="10.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">}</text>
<text x="112.0" y="222" font-size="10.5" text-anchor="middle" fill="#6a6d73">JSON Schema</text>
