<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="compiling a schema into an FSM and token masks">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">COMPILE ONCE</text>
<text x="552.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">USE EVERY STEP</text>
