<circle cx="510" cy="96" r="18" fill="#ffffff" stroke="#cfcdc4" stroke-width="1"/>
<text x="510" y="100" font-size="10" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" text-anchor="middle" fill="#3b3d42">}</text>
<text x="405.0" y="148" font-size="10.5" text-anchor="middle" fill="#6a6d73">finite-state machine</text>
