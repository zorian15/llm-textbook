<text x="300" y="100" font-size="10" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" text-anchor="middle" fill="#3b3d42">{</text>
<path d="M 320 96 L 350 96" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#s1)"/>
<circle cx="370" cy="96" r="18" fill="#ffffff" stroke="#cfcdc4" stroke-width="1"/>
<text x="370" y="100" font-size="10" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" text-anchor="middle" fill="#3b3d42">"ok":</text>
<path d="M 390 96 L 420 96" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#s1)"/>
<circle cx="440" cy="96" r="18" fill="#9c6b12" stroke="#9c6b12" stroke-width="2"/>
<text x="440" y="100" font-size="10" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" text-anchor="middle" fill="#ffffff">value</text>
