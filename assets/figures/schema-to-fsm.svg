<path d="M 530 96 C 528 96, 528 100, 546 100" fill="none" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#s1)"/>
<text x="340.0" y="292" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Decoding is a walk over the automaton; the mask at each step is a table lookup, not a fresh parse.</text>
<defs><marker id="s1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
<defs><marker id="s1a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#274b6d"/></marker></defs>
