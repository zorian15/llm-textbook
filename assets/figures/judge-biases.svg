<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="three systematic biases of an LLM judge">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">WHEN THE GRADER IS A MODEL</text>
<rect x="24" y="56" width="184" height="150" rx="10" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="24" y="56" width="184" height="30" rx="10" fill="#9c6b12"/>
<rect x="24" y="74" width="184" height="12" fill="#9c6b12"/>
<text x="116.0" y="76.0" font-size="13" font-weight="700" text-anchor="middle" fill="#ffffff">Position</text>
<text x="116.0" y="114.0" font-size="11.5" text-anchor="middle" fill="#17181b">prefers whichever</text>
<text x="116.0" y="130.0" font-size="11.5" text-anchor="middle" fill="#17181b">answer comes first</text>
<line x1="44" y1="156" x2="188" y2="156" stroke="#e4e3dd"/>
<text x="116.0" y="176.0" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">swap A and B</text>
<text x="116.0" y="190.0" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">→ winner flips</text>
<rect x="228" y="56" width="184" height="150" rx="10" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="228" y="56" width="184" height="30" rx="10" fill="#9c6b12"/>
<rect x="228" y="74" width="184" height="12" fill="#9c6b12"/>
<text x="320.0" y="76.0" font-size="13" font-weight="700" text-anchor="middle" fill="#ffffff">Verbosity</text>
<text x="320.0" y="114.0" font-size="11.5" text-anchor="middle" fill="#17181b">prefers the longer,</text>
<text x="320.0" y="130.0" font-size="11.5" text-anchor="middle" fill="#17181b">more padded answer</text>
<line x1="248" y1="156" x2="392" y2="156" stroke="#e4e3dd"/>
<text x="320.0" y="176.0" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">length beats</text>
<text x="320.0" y="190.0" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">correctness</text>
<rect x="432" y="56" width="184" height="150" rx="10" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="432" y="56" width="184" height="30" rx="10" fill="#9c6b12"/>
<rect x="432" y="74" width="184" height="12" fill="#9c6b12"/>
<text x="524.0" y="76.0" font-size="13" font-weight="700" text-anchor="middle" fill="#ffffff">Self-preference</text>
<text x="524.0" y="114.0" font-size="11.5" text-anchor="middle" fill="#17181b">rates its own family's</text>
<text x="524.0" y="130.0" font-size="11.5" text-anchor="middle" fill="#17181b">outputs higher</text>
<line x1="452" y1="156" x2="596" y2="156" stroke="#e4e3dd"/>
<text x="524.0" y="176.0" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">the judge is</text>
<text x="524.0" y="190.0" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">not neutral</text>
<text x="320.0" y="252.0" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Randomize order, control for length, and never let a model grade only itself.</text>
</svg>