<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="a ReAct trajectory with external memory">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">CONTEXT WINDOW (WORKING SCRATCHPAD)</text>
<rect x="24" y="44" width="420" height="244" rx="10" fill="#faf9f5" stroke="#cfcdc4" stroke-dasharray="5 4"/>
<rect x="40" y="64" width="70" height="26" rx="5" fill="#6b4f9c" stroke="none"/>
<text x="75" y="81" font-size="10" font-weight="700" text-anchor="middle" fill="#ffffff">Thought</text>
<text x="120" y="81" font-size="11" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#3b3d42">fare may have changed — re-check</text>
<rect x="40" y="100" width="70" height="26" rx="5" fill="#274b6d" stroke="none"/>
<text x="75" y="117" font-size="10" font-weight="700" text-anchor="middle" fill="#ffffff">Action</text>
<text x="120" y="117" font-size="11" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#3b3d42">search_flights(NYC, LON)</text>
<rect x="40" y="136" width="70" height="26" rx="5" fill="#ffffff" stroke="#6a6d73"/>
<text x="75" y="153" font-size="10" font-weight="700" text-anchor="middle" fill="#3b3d42">Observation</text>
<text x="120" y="153" font-size="11" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#3b3d42">3 fares, cheapest $612</text>
<rect x="40" y="172" width="70" height="26" rx="5" fill="#6b4f9c" stroke="none"/>
<text x="75" y="189" font-size="10" font-weight="700" text-anchor="middle" fill="#ffffff">Thought</text>
<text x="120" y="189" font-size="11" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#3b3d42">hold it, note the price for later</text>
<rect x="40" y="208" width="70" height="26" rx="5" fill="#274b6d" stroke="none"/>
<text x="75" y="225" font-size="10" font-weight="700" text-anchor="middle" fill="#ffffff">Action</text>
<text x="120" y="225" font-size="11" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#3b3d42">hold_fare(id=612)</text>
<rect x="40" y="244" width="70" height="26" rx="5" fill="#ffffff" stroke="#6a6d73"/>
<text x="75" y="261" font-size="10" font-weight="700" text-anchor="middle" fill="#3b3d42">Observation</text>
<text x="120" y="261" font-size="11" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#3b3d42">held, expires in 20 min</text>
<text x="508.0" y="82.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">EXTERNAL MEMORY</text>
<rect x="508" y="96" width="148" height="128" rx="10" fill="#eaf0f6" stroke="#274b6d"/>
<line x1="524" y1="126" x2="640" y2="126" stroke="#274b6d" stroke-width="1" opacity="0.35"/>
<text x="524" y="120" font-size="10" fill="#274b6d">notes & files</text>
<line x1="524" y1="156" x2="640" y2="156" stroke="#274b6d" stroke-width="1" opacity="0.35"/>
<text x="524" y="150" font-size="10" fill="#274b6d">prior results</text>
<line x1="524" y1="186" x2="640" y2="186" stroke="#274b6d" stroke-width="1" opacity="0.35"/>
<text x="524" y="180" font-size="10" fill="#274b6d">retrieved facts</text>
<path d="M 368 185.0 C 480 136, 490 136, 502 136" fill="none" stroke="#9c6b12" stroke-width="1.6" marker-end="url(#rt)"/>
<text x="476" y="122" font-size="9.5" text-anchor="middle" fill="#9c6b12">write</text>
<path d="M 502 192 C 490 192, 480 77.0, 368 77.0" fill="none" stroke="#274b6d" stroke-width="1.6" marker-end="url(#rta)"/>
<text x="476" y="208" font-size="9.5" text-anchor="middle" fill="#274b6d">read</text>
<text x="340.0" y="312" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Each thought plans the next action; the scratchpad is bounded by the window, so memory that must persist is written out.</text>
<defs><marker id="rt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9c6b12"/></marker></defs>
<defs><marker id="rta" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#274b6d"/></marker></defs>
</svg>