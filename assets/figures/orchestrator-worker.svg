<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="orchestrator delegating to parallel workers">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">ORCHESTRATOR AND WORKERS</text>
<rect x="248.0" y="52" width="184" height="52" rx="10" fill="#274b6d" stroke="none"/>
<text x="340.0" y="74" font-size="14" font-weight="700" text-anchor="middle" fill="#ffffff">orchestrator</text>
<text x="340.0" y="92" font-size="10" text-anchor="middle" fill="#eaf0f6">split, delegate, then synthesize</text>
<rect x="81.0" y="176" width="150" height="58" rx="9" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="81.0" y="176" width="4" height="58" rx="2" fill="#6b4f9c"/>
<text x="158.0" y="200" font-size="13" font-weight="700" text-anchor="middle" fill="#17181b">searcher</text>
<text x="158.0" y="218" font-size="10" text-anchor="middle" fill="#6a6d73">own context</text>
<path d="M 148.0 108 L 148.0 170" stroke="#274b6d" stroke-width="1.6" marker-end="url(#ow)"/>
<path d="M 164.0 170 L 164.0 108" stroke="#9c6b12" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#owa)"/>
<rect x="265.0" y="176" width="150" height="58" rx="9" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="265.0" y="176" width="4" height="58" rx="2" fill="#6b4f9c"/>
<text x="342.0" y="200" font-size="13" font-weight="700" text-anchor="middle" fill="#17181b">coder</text>
<text x="342.0" y="218" font-size="10" text-anchor="middle" fill="#6a6d73">own context</text>
<path d="M 332.0 108 L 332.0 170" stroke="#274b6d" stroke-width="1.6" marker-end="url(#ow)"/>
<path d="M 348.0 170 L 348.0 108" stroke="#9c6b12" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#owa)"/>
<rect x="449.0" y="176" width="150" height="58" rx="9" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="449.0" y="176" width="4" height="58" rx="2" fill="#6b4f9c"/>
<text x="526.0" y="200" font-size="13" font-weight="700" text-anchor="middle" fill="#17181b">critic</text>
<text x="526.0" y="218" font-size="10" text-anchor="middle" fill="#6a6d73">own context</text>
<path d="M 516.0 108 L 516.0 170" stroke="#274b6d" stroke-width="1.6" marker-end="url(#ow)"/>
<path d="M 532.0 170 L 532.0 108" stroke="#9c6b12" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#owa)"/>
<text x="75.0" y="144.0" font-size="9.5" text-anchor="end" fill="#274b6d">delegate</text>
<text x="605.0" y="144.0" font-size="9.5" fill="#9c6b12">findings</text>
<text x="340.0" y="286" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Workers help only when their threads are separable and parallel; each isolated context is also where handoffs leak.</text>
<defs><marker id="ow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#274b6d"/></marker></defs>
<defs><marker id="owa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9c6b12"/></marker></defs>
</svg>