<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="base model versus assistant">
<text x="330.0" y="30" font-size="13" text-anchor="middle" fill="#17181b">Same prompt: <tspan font-style="italic" fill="#274b6d">“How do I reverse a list in Python?”</tspan></text>
<text x="24.0" y="66.0" font-size="11" font-weight="700" fill="#b04a3f" letter-spacing="1">BASE MODEL</text>
<text x="24" y="82" font-size="10.5" font-style="italic" fill="#6a6d73">continues the document</text>
<rect x="24" y="96" width="294.0" height="150" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="24" y="96" width="4" height="150" rx="2" fill="#b04a3f"/>
<text x="42" y="124" font-size="11" fill="#3b3d42">How do I sort a list in Python?</text>
<text x="42" y="148" font-size="11" fill="#3b3d42">How do I remove duplicates from a</text>
<text x="42" y="172" font-size="11" fill="#3b3d42">list in Python? How do I reverse a</text>
<text x="42" y="196" font-size="11" fill="#3b3d42">string in Python? ...</text>
<text x="342.0" y="66.0" font-size="11" font-weight="700" fill="#274b6d" letter-spacing="1">AFTER POST-TRAINING</text>
<text x="342.0" y="82" font-size="10.5" font-style="italic" fill="#6a6d73">answers the request</text>
<rect x="342.0" y="96" width="294.0" height="150" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="342.0" y="96" width="4" height="150" rx="2" fill="#274b6d"/>
<text x="360.0" y="124" font-size="11" fill="#3b3d42">Use the .reverse() method to reverse</text>
<text x="360.0" y="148" font-size="11" fill="#3b3d42">in place, or the [::-1] slice to get a</text>
<text x="360.0" y="172" font-size="11" fill="#3b3d42">reversed copy:</text>
<text x="360.0" y="196" font-size="11" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#3b3d42">nums[::-1]</text>
<text x="330.0" y="284" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Same weights would continue the pattern; post-training teaches it to treat the prompt as a request.</text>
</svg>