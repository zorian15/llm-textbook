<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="byte-level fallback for a rare glyph">
<text x="24.0" y="32.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">NO UNKNOWN TOKEN, EVER</text>
<rect x="40.0" y="78.0" width="74.0" height="34.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="77.0" y="99.5" font-size="13" font-weight="400" text-anchor="middle" fill="#17181b">“ the ”</text>
<path d="M 120 95 L 156 95" stroke="#cfcdc4" stroke-width="1.5" marker-end="url(#b1)"/>
<rect x="162.0" y="78.0" width="70.0" height="34.0" rx="6" fill="#274b6d" stroke="none"/>
<text x="197.0" y="99.2" font-size="12" font-weight="400" text-anchor="middle" fill="#fff">1 token</text>
<text x="40" y="70" font-size="10.5" fill="#6a6d73">a frequent word</text>
<rect x="40.0" y="166.0" width="74.0" height="34.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="77.0" y="188.2" font-size="15" font-weight="400" text-anchor="middle" fill="#17181b">“ 🌍 ”</text>
<path d="M 120 183 L 156 183" stroke="#cfcdc4" stroke-width="1.5" marker-end="url(#b1)"/>
<rect x="162.0" y="166.0" width="44.0" height="34.0" rx="6" fill="#9c6b12" stroke="none"/>
<text x="184.0" y="186.8" font-size="11" font-weight="700" text-anchor="middle" fill="#fff">F0</text>
<rect x="214.0" y="166.0" width="44.0" height="34.0" rx="6" fill="#9c6b12" stroke="none"/>
<text x="236.0" y="186.8" font-size="11" font-weight="700" text-anchor="middle" fill="#fff">9F</text>
<rect x="266.0" y="166.0" width="44.0" height="34.0" rx="6" fill="#9c6b12" stroke="none"/>
<text x="288.0" y="186.8" font-size="11" font-weight="700" text-anchor="middle" fill="#fff">8C</text>
<rect x="318.0" y="166.0" width="44.0" height="34.0" rx="6" fill="#9c6b12" stroke="none"/>
<text x="340.0" y="186.8" font-size="11" font-weight="700" text-anchor="middle" fill="#fff">8D</text>
<text x="40" y="158" font-size="10.5" fill="#6a6d73">a rare glyph → its UTF-8 bytes</text>
<text x="376" y="188" font-size="10.5" fill="#6a6d73">4 byte-tokens</text>
<text x="310.0" y="238" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Falling back to 256 bytes means nothing is unrepresentable — but rare characters cost several tokens.</text>
<defs><marker id="b1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
</svg>