<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="the PPO reinforcement-learning loop for RLHF">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">THE RLHF LOOP (PPO)</text>
<rect x="24" y="74" width="70" height="52" rx="10" fill="#eaf0f6" stroke="#274b6d"/>
<text x="59.0" y="98" font-size="12.5" font-weight="700" text-anchor="middle" fill="#274b6d">prompt</text>
<text x="59.0" y="115" font-size="9.5" text-anchor="middle" fill="#eaf0f6">x</text>
<rect x="140" y="74" width="118" height="52" rx="10" fill="#274b6d" stroke="none"/>
<text x="199.0" y="98" font-size="12.5" font-weight="700" text-anchor="middle" fill="#ffffff">policy πθ</text>
<text x="199.0" y="115" font-size="9.5" text-anchor="middle" fill="#eaf0f6">being trained</text>
<rect x="310" y="74" width="118" height="52" rx="10" fill="#ffffff" stroke="#cfcdc4"/>
<text x="369.0" y="98" font-size="12.5" font-weight="700" text-anchor="middle" fill="#17181b">response y</text>
<text x="369.0" y="115" font-size="9.5" text-anchor="middle" fill="#6a6d73">sampled on-policy</text>
<rect x="480" y="74" width="176" height="52" rx="10" fill="#ffffff" stroke="#cfcdc4"/>
<text x="568.0" y="98" font-size="12.5" font-weight="700" text-anchor="middle" fill="#17181b">reward model</text>
<text x="568.0" y="115" font-size="9.5" text-anchor="middle" fill="#6a6d73">score r(x, y)</text>
<path d="M 94 100.0 L 136 100.0" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#rl1)"/>
<path d="M 258 100.0 L 306 100.0" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#rl1)"/>
<path d="M 428 100.0 L 476 100.0" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#rl1)"/>
<rect x="140" y="176" width="118" height="46" rx="10" fill="#f0efe9" stroke="#cfcdc4"/>
<text x="199" y="196" font-size="12" font-weight="700" text-anchor="middle" fill="#3b3d42">reference π_ref</text>
<text x="199" y="212" font-size="9.5" text-anchor="middle" fill="#6a6d73">frozen SFT copy</text>
<path d="M 199 126 L 199 176" stroke="#b04a3f" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#rl1b)"/>
<text x="209" y="155.0" font-size="10" fill="#b04a3f">KL leash</text>
<rect x="300" y="256" width="240" height="46" rx="10" fill="#faf9f5" stroke="#e4e3dd"/>
<text x="420" y="276" font-size="11.5" text-anchor="middle" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">r(x, y) &#8722; β·KL(πθ &#8214; π_ref)</text>
<text x="420" y="293" font-size="9.5" text-anchor="middle" fill="#6a6d73">advantage &#8594; clipped PPO update</text>
<path d="M 539 126 C 539 220, 540 248, 500 254" fill="none" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#rl1)"/>
<path d="M 258 199 C 290 199, 300 266, 298 270" fill="none" stroke="#b04a3f" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#rl1b)"/>
<path d="M 300 279 C 120 279, 120 146, 199 130" fill="none" stroke="#274b6d" stroke-width="1.8" marker-end="url(#rl1a)"/>
<text x="120" y="250" font-size="10" text-anchor="middle" fill="#274b6d" font-weight="600">update, then repeat</text>
<defs><marker id="rl1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
<defs><marker id="rl1a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#274b6d"/></marker></defs>
<defs><marker id="rl1b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b04a3f"/></marker></defs>
</svg>