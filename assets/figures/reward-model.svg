<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="a reward model scoring a chosen and a rejected response">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">LEARNING A REWARD FROM A CHOICE</text>
<rect x="24.0" y="132.0" width="66.0" height="34.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="57.0" y="153.2" font-size="12" font-weight="400" text-anchor="middle" fill="#274b6d">prompt</text>
<rect x="150" y="72" width="132" height="46" rx="8" fill="#ffffff" stroke="#274b6d"/>
<rect x="150" y="72" width="4" height="46" rx="2" fill="#274b6d"/>
<text x="166" y="94" font-size="12" font-weight="600" fill="#17181b">chosen  y</text>
<text x="166" y="110" font-size="9.5" fill="#6a6d73">preferred by a human</text>
<path d="M 90 149 C 120 149, 124 95, 146 95" fill="none" stroke="#cfcdc4" stroke-width="1.3"/>
<path d="M 282 95 C 282 95, 292 149, 318 149" fill="none" stroke="#cfcdc4" stroke-width="1.3" marker-end="url(#rm1)"/>
<rect x="150" y="196" width="132" height="46" rx="8" fill="#ffffff" stroke="#b04a3f"/>
<rect x="150" y="196" width="4" height="46" rx="2" fill="#b04a3f"/>
<text x="166" y="218" font-size="12" font-weight="600" fill="#17181b">rejected  y</text>
<text x="166" y="234" font-size="9.5" fill="#6a6d73">the other option</text>
<path d="M 90 149 C 120 149, 124 219, 146 219" fill="none" stroke="#cfcdc4" stroke-width="1.3"/>
<path d="M 282 219 C 282 219, 292 149, 318 149" fill="none" stroke="#cfcdc4" stroke-width="1.3" marker-end="url(#rm1)"/>
<rect x="322" y="118" width="96" height="62" rx="10" fill="#274b6d"/>
<text x="370" y="144" font-size="13" font-weight="700" text-anchor="middle" fill="#ffffff">reward</text>
<text x="370" y="161" font-size="13" font-weight="700" text-anchor="middle" fill="#ffffff">model</text>
<text x="370" y="196" font-size="9.5" text-anchor="middle" fill="#6a6d73">SFT body + scalar head</text>
<path d="M 418 149 C 442 149, 422 95, 448 95" fill="none" stroke="#274b6d" stroke-width="1.4" marker-end="url(#rm1)"/>
<text x="456" y="99" font-size="12.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#274b6d">r(x, y_w)</text>
<path d="M 418 149 C 442 149, 422 219, 448 219" fill="none" stroke="#b04a3f" stroke-width="1.4" marker-end="url(#rm1)"/>
<text x="456" y="223" font-size="12.5" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#b04a3f">r(x, y_l)</text>
<rect x="446" y="128" width="176" height="42" rx="8" fill="#faf9f5" stroke="#e4e3dd" opacity="0"/>
<text x="512" y="256" font-size="11.5" text-anchor="middle" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">loss = &#8722;log &#963;(r_w &#8722; r_l)</text>
<text x="512" y="274" font-size="10" text-anchor="middle" fill="#6a6d73">push the chosen reward above the rejected</text>
<path d="M 512 175 L 512 240" fill="none" stroke="#cfcdc4" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#rm1)"/>
<defs><marker id="rm1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
</svg>