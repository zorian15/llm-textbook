<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 296" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Two models pay different bit costs for the same next token.">
<text x="24.0" y="38.0" font-size="11" font-weight="700" fill="#274b6d" letter-spacing="1">SHARP MODEL: PAYS 1 BIT</text>
<rect x="24.0" y="48.0" width="64.0" height="26.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="56.0" y="65.2" font-size="12" font-weight="400" text-anchor="middle" fill="#3b3d42">the</text>
<rect x="94.0" y="48.0" width="64.0" height="26.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="126.0" y="65.2" font-size="12" font-weight="400" text-anchor="middle" fill="#3b3d42">capital</text>
<rect x="164.0" y="48.0" width="64.0" height="26.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="196.0" y="65.2" font-size="12" font-weight="400" text-anchor="middle" fill="#3b3d42">of</text>
<rect x="234.0" y="48.0" width="64.0" height="26.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="266.0" y="65.2" font-size="12" font-weight="400" text-anchor="middle" fill="#3b3d42">France</text>
<rect x="304.0" y="48.0" width="64.0" height="26.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="336.0" y="65.2" font-size="12" font-weight="400" text-anchor="middle" fill="#3b3d42">is</text>
<rect x="384.0" y="48.0" width="64.0" height="26.0" rx="6" fill="#274b6d" stroke="none"/>
<text x="416.0" y="65.2" font-size="12" font-weight="700" text-anchor="middle" fill="#ffffff">Paris</text>
<text x="416.0" y="90" font-size="10.5" text-anchor="middle" fill="#6a6d73">p = 0.50</text>
<rect x="474.0" y="53.0" width="16" height="16" rx="3" fill="#274b6d" opacity="0.90"/>
<text x="474.0" y="90" font-size="10.5" fill="#274b6d">-log2(0.50) &#8776; 1.0 bits</text>
<text x="24.0" y="154.0" font-size="11" font-weight="700" fill="#b04a3f" letter-spacing="1">FLAT MODEL: PAYS 5.6 BITS</text>
<rect x="24.0" y="164.0" width="64.0" height="26.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="56.0" y="181.2" font-size="12" font-weight="400" text-anchor="middle" fill="#3b3d42">the</text>
<rect x="94.0" y="164.0" width="64.0" height="26.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="126.0" y="181.2" font-size="12" font-weight="400" text-anchor="middle" fill="#3b3d42">capital</text>
<rect x="164.0" y="164.0" width="64.0" height="26.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="196.0" y="181.2" font-size="12" font-weight="400" text-anchor="middle" fill="#3b3d42">of</text>
<rect x="234.0" y="164.0" width="64.0" height="26.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="266.0" y="181.2" font-size="12" font-weight="400" text-anchor="middle" fill="#3b3d42">France</text>
<rect x="304.0" y="164.0" width="64.0" height="26.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="336.0" y="181.2" font-size="12" font-weight="400" text-anchor="middle" fill="#3b3d42">is</text>
<rect x="384.0" y="164.0" width="64.0" height="26.0" rx="6" fill="#b04a3f" stroke="none"/>
<text x="416.0" y="181.2" font-size="12" font-weight="700" text-anchor="middle" fill="#ffffff">Paris</text>
<text x="416.0" y="206" font-size="10.5" text-anchor="middle" fill="#6a6d73">p = 0.02</text>
<rect x="474.0" y="169.0" width="16" height="16" rx="3" fill="#b04a3f" opacity="0.90"/>
<rect x="493.0" y="169.0" width="16" height="16" rx="3" fill="#b04a3f" opacity="0.82"/>
<rect x="512.0" y="169.0" width="16" height="16" rx="3" fill="#b04a3f" opacity="0.74"/>
<rect x="531.0" y="169.0" width="16" height="16" rx="3" fill="#b04a3f" opacity="0.66"/>
<rect x="550.0" y="169.0" width="16" height="16" rx="3" fill="#b04a3f" opacity="0.58"/>
<rect x="569.0" y="169.0" width="16" height="16" rx="3" fill="#b04a3f" opacity="0.50"/>
<text x="474.0" y="206" font-size="10.5" fill="#b04a3f">-log2(0.02) &#8776; 5.6 bits</text>
<text x="330.0" y="284" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Same token, different bill. Summed over a corpus, the sharper model writes the shorter file &#8212; the loss is that file's size.</text>
</svg>