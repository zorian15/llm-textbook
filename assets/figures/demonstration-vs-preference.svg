<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="a demonstration to imitate versus preferences to rank">
<text x="24.0" y="34.0" font-size="11" font-weight="700" fill="#6b4f9c" letter-spacing="1">SUPERVISED FINE-TUNING</text>
<text x="24" y="52" font-size="10.5" font-style="italic" fill="#6a6d73">imitate one written answer</text>
<rect x="24.0" y="66.0" width="294.0" height="30.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="171.0" y="84.8" font-size="11" font-weight="400" text-anchor="middle" fill="#274b6d">“What is a good name for a coffee shop?”</text>
<text x="342.0" y="34.0" font-size="11" font-weight="700" fill="#274b6d" letter-spacing="1">PREFERENCE LEARNING</text>
<text x="342.0" y="52" font-size="10.5" font-style="italic" fill="#6a6d73">rank answers the model wrote</text>
<rect x="342.0" y="66.0" width="294.0" height="30.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="489.0" y="84.8" font-size="11" font-weight="400" text-anchor="middle" fill="#274b6d">“What is a good name for a coffee shop?”</text>
<path d="M 171.0 98 L 171.0 128" stroke="#cfcdc4" stroke-width="1.5" marker-end="url(#dp1)"/>
<rect x="24" y="132" width="294.0" height="46" rx="8" fill="#ffffff" stroke="#6b4f9c"/>
<rect x="24" y="132" width="4" height="46" rx="2" fill="#6b4f9c"/>
<text x="42" y="152" font-size="11.5" fill="#17181b">“The Daily Grind”</text>
<text x="42" y="169" font-size="10" fill="#6a6d73">the one answer a human wrote</text>
<text x="171.0" y="210" font-size="10.5" text-anchor="middle" fill="#6b4f9c" font-weight="600">copy it &#183; ceiling = the annotator</text>
<path d="M 489.0 98 L 489.0 116" stroke="#cfcdc4" stroke-width="1.5" marker-end="url(#dp1)"/>
<rect x="372.0" y="120" width="264.0" height="34" rx="7" fill="#ffffff" stroke="#cfcdc4"/>
<text x="386.0" y="142" font-size="11" fill="#3b3d42">“The Grind House”</text>
<circle cx="354.0" cy="137" r="12" fill="#9c6b12"/>
<text x="354.0" y="141" font-size="12" font-weight="700" text-anchor="middle" fill="#ffffff">1</text>
<rect x="372.0" y="162" width="264.0" height="34" rx="7" fill="#ffffff" stroke="#cfcdc4"/>
<text x="386.0" y="184" font-size="11" fill="#3b3d42">“Bean There”</text>
<circle cx="354.0" cy="179" r="12" fill="#6a6d73"/>
<text x="354.0" y="183" font-size="12" font-weight="700" text-anchor="middle" fill="#ffffff">2</text>
<rect x="372.0" y="204" width="264.0" height="34" rx="7" fill="#ffffff" stroke="#cfcdc4"/>
<text x="386.0" y="226" font-size="11" fill="#3b3d42">“Coffee Place #4”</text>
<circle cx="354.0" cy="221" r="12" fill="#cfcdc4"/>
<text x="354.0" y="225" font-size="12" font-weight="700" text-anchor="middle" fill="#ffffff">3</text>
<text x="489.0" y="252" font-size="10.5" text-anchor="middle" fill="#274b6d" font-weight="600">judge them &#183; no ceiling on quality</text>
<defs><marker id="dp1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
</svg>