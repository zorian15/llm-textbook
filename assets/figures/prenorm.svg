<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="post-norm versus pre-norm placement">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">WHERE NORMALIZATION SITS</text>
<text x="160" y="60" font-size="12" font-weight="700" text-anchor="middle" fill="#17181b">post-norm (2017)</text>
<path d="M 160 76 L 160 232" stroke="#cfcdc4" stroke-width="2.5" stroke-dasharray="4 4"/>
<rect x="116.0" y="92.0" width="88.0" height="26.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="160.0" y="108.7" font-size="10.5" font-weight="700" text-anchor="middle" fill="#17181b">Attention</text>
<circle cx="160" cy="145" r="11" fill="#ffffff" stroke="#274b6d" stroke-width="1.8"/>
<text x="160" y="150" font-size="13" text-anchor="middle" fill="#274b6d">+</text>
<rect x="116.0" y="172.0" width="88.0" height="26.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="160.0" y="188.5" font-size="10" font-weight="400" text-anchor="middle" fill="#274b6d">LayerNorm</text>
<text x="450" y="60" font-size="12" font-weight="700" text-anchor="middle" fill="#17181b">pre-norm (modern)</text>
<path d="M 450 76 L 450 232" stroke="#274b6d" stroke-width="2.5"/>
<rect x="406.0" y="92.0" width="88.0" height="26.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="450.0" y="108.5" font-size="10" font-weight="400" text-anchor="middle" fill="#274b6d">RMSNorm</text>
<rect x="406.0" y="132.0" width="88.0" height="26.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="450.0" y="148.7" font-size="10.5" font-weight="700" text-anchor="middle" fill="#17181b">Attention</text>
<circle cx="450" cy="185" r="11" fill="#ffffff" stroke="#274b6d" stroke-width="1.8"/>
<text x="450" y="190" font-size="13" text-anchor="middle" fill="#274b6d">+</text>
<text x="310.0" y="270" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Pre-norm keeps the residual stream an unbroken identity path, so gradients survive great depth.</text>
</svg>