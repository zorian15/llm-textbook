<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 292" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="the GGUF, bitsandbytes, and MLX formats">
<text x="30.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">WHICH FORMAT DO I REACH FOR?</text>
<rect x="30.0" y="60" width="198.7" height="176" rx="9" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="30.0" y="60" width="198.7" height="5" rx="2.5" fill="#274b6d"/>
<text x="46.0" y="92" font-size="13.5" font-weight="700" fill="#17181b">GGUF / llama.cpp</text>
<text x="46.0" y="112" font-size="11" font-style="italic" fill="#274b6d">run a model locally</text>
<text x="46.0" y="140" font-size="11" fill="#3b3d42">CPU + GPU, Metal on Macs</text>
<text x="46.0" y="161" font-size="11" fill="#3b3d42">K-quants: mixed bits,</text>
<text x="46.0" y="182" font-size="11" fill="#3b3d42">more where it hurts</text>
<text x="46.0" y="203" font-size="11" fill="#3b3d42">the local default (App. A)</text>
<rect x="250.7" y="60" width="198.7" height="176" rx="9" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="250.7" y="60" width="198.7" height="5" rx="2.5" fill="#6b4f9c"/>
<text x="266.7" y="92" font-size="13.5" font-weight="700" fill="#17181b">bitsandbytes</text>
<text x="266.7" y="112" font-size="11" font-style="italic" fill="#6b4f9c">train in PyTorch / HF</text>
<text x="266.7" y="140" font-size="11" fill="#3b3d42">NF4 + 8-bit, in Python</text>
<text x="266.7" y="161" font-size="11" fill="#3b3d42">the engine behind QLoRA</text>
<text x="266.7" y="182" font-size="11" fill="#3b3d42">load a 4-bit base and</text>
<text x="266.7" y="203" font-size="11" fill="#3b3d42">fine-tune adapters (Ch. 13)</text>
<rect x="471.3" y="60" width="198.7" height="176" rx="9" fill="#ffffff" stroke="#cfcdc4"/>
<rect x="471.3" y="60" width="198.7" height="5" rx="2.5" fill="#9c6b12"/>
<text x="487.3" y="92" font-size="13.5" font-weight="700" fill="#17181b">MLX</text>
<text x="487.3" y="112" font-size="11" font-style="italic" fill="#9c6b12">build on Apple silicon</text>
<text x="487.3" y="140" font-size="11" fill="#3b3d42">unified-memory native</text>
<text x="487.3" y="161" font-size="11" fill="#3b3d42">run and fine-tune on a Mac</text>
<text x="487.3" y="182" font-size="11" fill="#3b3d42">Metal kernels, tuned</text>
<text x="487.3" y="203" font-size="11" fill="#3b3d42">for exactly that chip</text>
<text x="350.0" y="282" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">All three carry the same idea in different wrappers: fewer bits per weight, packaged for a runtime.</text>
</svg>