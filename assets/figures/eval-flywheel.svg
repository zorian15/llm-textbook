<text x="300.0" y="67.0" font-size="12" font-weight="700" text-anchor="middle" fill="#274b6d">Ship</text>
<text x="300.0" y="82.0" font-size="9.5" text-anchor="middle" fill="#6a6d73">a change to prod</text>
<rect x="338.7" y="121.6" width="128" height="46" rx="8" fill="#ffffff" stroke="#6b4f9c" stroke-width="1.6"/>
<text x="402.7" y="141.6" font-size="12" font-weight="700" text-anchor="middle" fill="#6b4f9c">Log</text>
<text x="402.7" y="156.6" font-size="9.5" text-anchor="middle" fill="#6a6d73">capture every trace</text>
<rect x="299.5" y="242.4" width="128" height="46" rx="8" fill="#ffffff" stroke="#9c6b12" stroke-width="1.6"/>
<text x="363.5" y="262.4" font-size="12" font-weight="700" text-anchor="middle" fill="#9c6b12">Label</text>
<text x="363.5" y="277.4" font-size="9.5" text-anchor="middle" fill="#6a6d73">triage the failures</text>
<rect x="172.5" y="242.4" width="128" height="46" rx="8" fill="#ffffff" stroke="#b04a3f" stroke-width="1.6"/>
<text x="236.5" y="262.4" font-size="12" font-weight="700" text-anchor="middle" fill="#b04a3f">Grow the eval set</text>
<text x="236.5" y="277.4" font-size="9.5" text-anchor="middle" fill="#6a6d73">each failure → a case</text>
