<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="weak-to-strong generalization">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">WEAK-TO-STRONG GENERALIZATION</text>
<rect x="40.0" y="96.0" width="150.0" height="66.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="115.0" y="133.2" font-size="12" font-weight="400" text-anchor="middle" fill="#17181b"></text>
<text x="115" y="120" font-size="12" font-weight="700" text-anchor="middle" fill="#274b6d">weak supervisor</text>
<text x="115" y="138" font-size="9.5" text-anchor="middle" fill="#3b3d42">human, or smaller model</text>
<text x="115" y="153" font-size="9.5" text-anchor="middle" fill="#b04a3f">labels are partly wrong</text>
<path d="M 192 129 L 250 129" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#so1)"/>
<text x="221" y="118" font-size="9" text-anchor="middle" fill="#6a6d73">noisy</text>
<text x="221" y="150" font-size="9" text-anchor="middle" fill="#6a6d73">labels</text>
<rect x="252.0" y="96.0" width="150.0" height="66.0" rx="6" fill="#ffffff" stroke="#9c6b12"/>
<text x="327.0" y="133.2" font-size="12" font-weight="400" text-anchor="middle" fill="#17181b"></text>
<rect x="252" y="96" width="4" height="66" rx="2" fill="#9c6b12"/>
<text x="327" y="122" font-size="12" font-weight="700" text-anchor="middle" fill="#17181b">strong model</text>
<text x="327" y="140" font-size="9.5" text-anchor="middle" fill="#3b3d42">knows more than</text>
<text x="327" y="154" font-size="9.5" text-anchor="middle" fill="#3b3d42">the teacher can check</text>
<rect x="452" y="96" width="120" height="22" rx="4" fill="#e4e3dd" />
<rect x="452" y="96" width="50.4" height="22" rx="4" fill="#274b6d"/>
<text x="452" y="92" font-size="9" fill="#274b6d">teacher</text>
<rect x="452" y="126" width="120" height="22" rx="4" fill="#e4e3dd" />
<rect x="452" y="126" width="66.0" height="22" rx="4" fill="#6a6d73"/>
<text x="452" y="122" font-size="9" fill="#6a6d73">naive copy</text>
<rect x="452" y="156" width="120" height="22" rx="4" fill="#e4e3dd" />
<rect x="452" y="156" width="93.6" height="22" rx="4" fill="#9c6b12"/>
<text x="452" y="152" font-size="9" fill="#9c6b12">elicited</text>
<text x="512.0" y="192" font-size="9" text-anchor="middle" fill="#6a6d73">accuracy recovered</text>
<text x="310.0" y="270" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Weak labels can elicit more than the teacher knows, yet still fall short of the student's full capability.</text>
<defs><marker id="so1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
</svg>