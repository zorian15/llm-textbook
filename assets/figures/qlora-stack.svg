<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="the QLoRA quantized-base adapter stack">
<text x="24.0" y="30.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">QLoRA: 4-BIT BASE, bf16 ADAPTERS</text>
<rect x="30.0" y="96.0" width="156.0" height="46.0" rx="6" fill="#274b6d" stroke="none"/>
<text x="108.0" y="123.5" font-size="13" font-weight="700" text-anchor="middle" fill="#ffffff">W₀: 4-bit NF4</text>
<text x="108" y="160" font-size="10" text-anchor="middle" fill="#6a6d73">double-quantized, frozen</text>
<rect x="236.0" y="96.0" width="150.0" height="46.0" rx="6" fill="#ffffff" stroke="#274b6d"/>
<text x="311.0" y="123.2" font-size="12" font-weight="400" text-anchor="middle" fill="#274b6d">dequantize → bf16</text>
<path d="M 190 119 L 232 119" stroke="#cfcdc4" stroke-width="1.6" marker-end="url(#q1)"/>
<rect x="236.0" y="180.0" width="150.0" height="46.0" rx="6" fill="#9c6b12" stroke="none"/>
<text x="311.0" y="207.2" font-size="12" font-weight="700" text-anchor="middle" fill="#ffffff">LoRA B, A (bf16)</text>
<circle cx="452" cy="142" r="18" fill="#ffffff" stroke="#3b3d42"/>
<text x="452" y="148" font-size="18" text-anchor="middle" fill="#3b3d42">+</text>
<path d="M 388 119 C 414 119, 424 138, 434 140" stroke="#274b6d" stroke-width="1.6" fill="none" marker-end="url(#q1)"/>
<path d="M 388 203 C 414 203, 424 150, 434 146" stroke="#9c6b12" stroke-width="1.6" fill="none" marker-end="url(#q1)"/>
<rect x="512.0" y="119.0" width="120.0" height="46.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="572.0" y="146.2" font-size="12" font-weight="600" text-anchor="middle" fill="#274b6d">output h</text>
<path d="M 470 142 L 508 142" stroke="#274b6d" stroke-width="1.6" marker-end="url(#q1)"/>
<path d="M 572 168 C 560 250, 340 254, 312 228" stroke="#b04a3f" stroke-width="1.6" stroke-dasharray="6 4" fill="none" marker-end="url(#qb)"/>
<text x="440" y="270" font-size="10.5" text-anchor="middle" fill="#b04a3f">gradients flow into the adapters only</text>
<text x="108" y="230" font-size="10" text-anchor="middle" fill="#6a6d73" font-style="italic">no gradient here</text>
<text x="24" y="290" font-size="10.5" fill="#3b3d42">Result: a 65B model fine-tunes on one 48 GB GPU; paged optimizers spill spikes to CPU.</text>
<defs><marker id="q1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#274b6d"/></marker></defs>
<defs><marker id="qb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b04a3f"/></marker></defs>
</svg>