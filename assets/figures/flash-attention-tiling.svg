<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="FlashAttention tiling across the memory hierarchy">
<text x="24.0" y="28.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">ATTENTION IS BOUND BY MEMORY TRAFFIC, NOT FLOPS</text>
<rect x="24" y="52" width="236" height="224" rx="10" fill="#faf9f5" stroke="#cfcdc4"/>
<text x="38" y="74" font-size="12" font-weight="700" fill="#17181b">HBM</text>
<text x="38" y="90" font-size="10" fill="#6a6d73">large, slow</text>
<rect x="42.0" y="106.0" width="58.0" height="32.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="71.0" y="126.5" font-size="13" font-weight="700" text-anchor="middle" fill="#274b6d">Q</text>
<rect x="112.0" y="106.0" width="58.0" height="32.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="141.0" y="126.5" font-size="13" font-weight="700" text-anchor="middle" fill="#274b6d">K</text>
<rect x="182.0" y="106.0" width="58.0" height="32.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="211.0" y="126.5" font-size="13" font-weight="700" text-anchor="middle" fill="#274b6d">V</text>
<rect x="64" y="162" width="156" height="78" rx="6" fill="#f0efe9" stroke="#b04a3f" stroke-dasharray="4 3"/>
<line x1="64" y1="162" x2="220" y2="240" stroke="#b04a3f" stroke-width="1.2"/>
<text x="142.0" y="199.0" font-size="11" text-anchor="middle" fill="#b04a3f" font-weight="600">n x n scores</text>
<text x="142.0" y="215.0" font-size="10" text-anchor="middle" fill="#b04a3f">never built</text>
<rect x="402" y="78" width="254" height="150" rx="10" fill="#eaf0f6" stroke="#274b6d"/>
<text x="416" y="100" font-size="12" font-weight="700" fill="#274b6d">SRAM</text>
<text x="416" y="116" font-size="10" fill="#274b6d">small, fast</text>
<text x="529.0" y="146" font-size="11" text-anchor="middle" fill="#17181b">Q tile x K tile</text>
<text x="529.0" y="168" font-size="11" text-anchor="middle" fill="#17181b">online softmax</text>
<text x="529.0" y="190" font-size="11" text-anchor="middle" fill="#17181b">accumulate x V</text>
<path d="M 264 126 C 340 126, 360 138, 398 138" fill="none" stroke="#274b6d" stroke-width="1.6" marker-end="url(#fl)"/>
<text x="330" y="110" font-size="9.5" text-anchor="middle" fill="#274b6d">load K, V tiles</text>
<path d="M 398 204 C 360 204, 340 270, 264 270" fill="none" stroke="#6b4f9c" stroke-width="1.6" marker-end="url(#flv)"/>
<text x="332" y="262" font-size="9.5" text-anchor="middle" fill="#6b4f9c">write output only</text>
<text x="529.0" y="258" font-size="10" text-anchor="middle" fill="#6a6d73">loop over tiles; backward recomputes them</text>
<text x="340.0" y="312" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Exact attention, same FLOPs — the win is not touching HBM with an n x n matrix.</text>
<defs><marker id="fl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#274b6d"/></marker></defs>
<defs><marker id="flv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6b4f9c"/></marker></defs>
</svg>