<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="float32, float16, and bfloat16 bit layouts">
<text x="24.0" y="34.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">WHERE THE 16 (OR 32) BITS GO</text>
<text x="106" y="84.0" font-size="12" text-anchor="end" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">float32</text>
<rect x="118.0" y="60" width="15.0" height="40" fill="#3b3d42" opacity="0.55" stroke="#ffffff" stroke-width="1"/>
<text x="125.5" y="84.0" font-size="10" text-anchor="middle" fill="#ffffff" font-weight="600">1</text>
<rect x="133.0" y="60" width="120.0" height="40" fill="#274b6d" opacity="0.85" stroke="#ffffff" stroke-width="1"/>
<text x="193.0" y="84.0" font-size="10" text-anchor="middle" fill="#ffffff" font-weight="600">8</text>
<rect x="253.0" y="60" width="345.0" height="40" fill="#9c6b12" opacity="0.85" stroke="#ffffff" stroke-width="1"/>
<text x="425.5" y="84.0" font-size="10" text-anchor="middle" fill="#ffffff" font-weight="600">23</text>
<text x="106" y="150.0" font-size="12" text-anchor="end" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">float16</text>
<rect x="118.0" y="126" width="15.0" height="40" fill="#3b3d42" opacity="0.55" stroke="#ffffff" stroke-width="1"/>
<text x="125.5" y="150.0" font-size="10" text-anchor="middle" fill="#ffffff" font-weight="600">1</text>
<rect x="133.0" y="126" width="75.0" height="40" fill="#274b6d" opacity="0.85" stroke="#ffffff" stroke-width="1"/>
<text x="170.5" y="150.0" font-size="10" text-anchor="middle" fill="#ffffff" font-weight="600">5</text>
<rect x="208.0" y="126" width="150.0" height="40" fill="#9c6b12" opacity="0.85" stroke="#ffffff" stroke-width="1"/>
<text x="283.0" y="150.0" font-size="10" text-anchor="middle" fill="#ffffff" font-weight="600">10</text>
<text x="106" y="216.0" font-size="12" text-anchor="end" font-family="'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" fill="#17181b">bfloat16</text>
<rect x="118.0" y="192" width="15.0" height="40" fill="#3b3d42" opacity="0.55" stroke="#ffffff" stroke-width="1"/>
<text x="125.5" y="216.0" font-size="10" text-anchor="middle" fill="#ffffff" font-weight="600">1</text>
<rect x="133.0" y="192" width="120.0" height="40" fill="#274b6d" opacity="0.85" stroke="#ffffff" stroke-width="1"/>
<text x="193.0" y="216.0" font-size="10" text-anchor="middle" fill="#ffffff" font-weight="600">8</text>
<rect x="253.0" y="192" width="105.0" height="40" fill="#9c6b12" opacity="0.85" stroke="#ffffff" stroke-width="1"/>
<text x="305.5" y="216.0" font-size="10" text-anchor="middle" fill="#ffffff" font-weight="600">7</text>
<path d="M 253.0 54 L 253.0 238" stroke="#274b6d" stroke-width="1" stroke-dasharray="3 3" opacity="0.7"/>
<rect x="118.0" y="243" width="13" height="13" rx="2" fill="#3b3d42" opacity="0.85"/>
<text x="137.0" y="254" font-size="10.5" fill="#3b3d42">sign</text>
<rect x="182.8" y="243" width="13" height="13" rx="2" fill="#274b6d" opacity="0.85"/>
<text x="201.8" y="254" font-size="10.5" fill="#3b3d42">exponent</text>
<rect x="272.4" y="243" width="13" height="13" rx="2" fill="#9c6b12" opacity="0.85"/>
<text x="291.4" y="254" font-size="10.5" fill="#3b3d42">mantissa</text>
<text x="330.0" y="268" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">bfloat16 keeps float32’s exponent (its range) and spends the savings out of the mantissa (its precision).</text>
</svg>