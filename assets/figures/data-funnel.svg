<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 646 268" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="The cleaning funnel from raw crawl to training corpus.">
<text x="24.0" y="26.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">FRACTION OF THE RAW CRAWL THAT SURVIVES</text>
<rect x="24" y="46.0" width="88" height="150.0" rx="6" fill="#274b6d" opacity="1.00"/>
<text x="68.0" y="38.0" font-size="11" font-weight="700" text-anchor="middle" fill="#3b3d42">100%</text>
<text x="68.0" y="214" font-size="10" font-weight="600" text-anchor="middle" fill="#17181b">Raw crawl</text>
<text x="68.0" y="229" font-size="9" text-anchor="middle" fill="#6a6d73">the scrape</text>
<path d="M 114 184 L 124 184" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#funnelarrow)"/>
<rect x="126" y="103.0" width="88" height="93.0" rx="6" fill="#274b6d" opacity="0.75"/>
<text x="170.0" y="95.0" font-size="11" font-weight="700" text-anchor="middle" fill="#3b3d42">62%</text>
<text x="170.0" y="214" font-size="10" font-weight="600" text-anchor="middle" fill="#17181b">Extraction</text>
<text x="170.0" y="242" font-size="9" text-anchor="middle" fill="#6a6d73">HTML to text</text>
<path d="M 216 184 L 226 184" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#funnelarrow)"/>
<rect x="228" y="127.0" width="88" height="69.0" rx="6" fill="#274b6d" opacity="0.65"/>
<text x="272.0" y="119.0" font-size="11" font-weight="700" text-anchor="middle" fill="#3b3d42">46%</text>
<text x="272.0" y="214" font-size="10" font-weight="600" text-anchor="middle" fill="#17181b">Language ID</text>
<text x="272.0" y="229" font-size="9" text-anchor="middle" fill="#6a6d73">target languages</text>
<path d="M 318 184 L 328 184" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#funnelarrow)"/>
<rect x="330" y="154.0" width="88" height="42.0" rx="6" fill="#274b6d" opacity="0.53"/>
<text x="374.0" y="146.0" font-size="11" font-weight="700" text-anchor="middle" fill="#3b3d42">28%</text>
<text x="374.0" y="214" font-size="10" font-weight="600" text-anchor="middle" fill="#17181b">Quality filter</text>
<text x="374.0" y="242" font-size="9" text-anchor="middle" fill="#6a6d73">rules + classifiers</text>
<path d="M 420 184 L 430 184" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#funnelarrow)"/>
<rect x="432" y="170.5" width="88" height="25.5" rx="6" fill="#274b6d" opacity="0.46"/>
<text x="476.0" y="162.5" font-size="11" font-weight="700" text-anchor="middle" fill="#3b3d42">17%</text>
<text x="476.0" y="214" font-size="10" font-weight="600" text-anchor="middle" fill="#17181b">Deduplication</text>
<text x="476.0" y="229" font-size="9" text-anchor="middle" fill="#6a6d73">fuzzy matches out</text>
<path d="M 522 184 L 532 184" stroke="#cfcdc4" stroke-width="1.4" marker-end="url(#funnelarrow)"/>
<rect x="534" y="172.0" width="88" height="24.0" rx="6" fill="#9c6b12" opacity="0.45"/>
<text x="578.0" y="164.0" font-size="11" font-weight="700" text-anchor="middle" fill="#3b3d42">16%</text>
<text x="578.0" y="214" font-size="10" font-weight="600" text-anchor="middle" fill="#17181b">Decontamination</text>
<text x="578.0" y="242" font-size="9" text-anchor="middle" fill="#6a6d73">eval overlap out</text>
<defs><marker id="funnelarrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cfcdc4"/></marker></defs>
<text x="323.0" y="258" font-size="10.5" text-anchor="middle" fill="#6a6d73" font-style="italic">Fractions are illustrative; real pipelines report similar shapes. The corpus is a deliberate residue, not a sample.</text>
</svg>